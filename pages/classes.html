<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clases — AcademiaPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
<script src="../js/mock-data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
Auth.requireAuth();
const user = Auth.getCurrentUser();
Utils.renderAppLayout('Clases', 'classes');
const main = document.getElementById('app-main');

/* ================================================================
   STUDENT VIEW
   ================================================================ */
function buildStudentClasses(u) {
  const myEnrollments = MOCK_DB.enrollments.filter(e => e.student_id === u.id);
  const myClassIds = myEnrollments.filter(e => e.status === 'active' || e.status === 'waiting').map(e => e.class_id);

  const availableClasses = MOCK_DB.classes.filter(c => c.status === 'active');

  function buildClassCard(cls, enrollment) {
    const enrolled = DB.getEnrollmentsForClass(cls.id).length;
    const waitlist = MOCK_DB.enrollments.filter(e => e.class_id === cls.id && e.status === 'waiting').length;
    const isFull = cls.max_students && enrolled >= cls.max_students;
    const pct = cls.max_students ? Math.min(100, Math.round(enrolled / cls.max_students * 100)) : 0;
    const myEnroll = myEnrollments.find(e => e.class_id === cls.id);

    const access = DB.checkEnrollAccess(u.id, cls.id);
    let ctaButton = '';
    if (myEnroll?.status === 'active') {
      const pendingTxn = MOCK_DB.transactions.find(t => t.student_id === u.id && t.type === 'income' && t.status === 'pending');
      ctaButton = `
        <div style="display:flex;gap:var(--space-2);flex-wrap:wrap">
          <span class="badge badge-success">Inscrito ✓</span>
          ${pendingTxn
            ? `<button class="btn btn-primary btn-sm" onclick="openPayModal('${pendingTxn.id}','${pendingTxn.subcategory}',${pendingTxn.amount})">${pendingTxn.subcategory} · ${Utils.formatCurrency(pendingTxn.amount)}</button>`
            : ''}
          <button class="btn btn-outline-danger btn-sm" onclick="cancelEnroll('${myEnroll.id}','${cls.name}')">Cancelar</button>
        </div>`;
    } else if (myEnroll?.status === 'waiting') {
      ctaButton = `<span class="badge badge-warning">Lista de espera #${myEnroll.waiting_position}</span>`;
    } else if (access.level_block) {
      ctaButton = `<span class="badge badge-danger" title="${access.reason}">Nivel insuficiente</span><div style="font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:4px">${access.reason}</div>`;
    } else if (isFull) {
      ctaButton = `<button class="btn btn-outline btn-sm" onclick="joinWaitlist('${cls.id}','${cls.name}')">Unirse a lista de espera</button>`;
    } else if (access.premium) {
      ctaButton = `
        <div>
          <div style="font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:4px">No incluida en tu plan · costo individual</div>
          <button class="btn btn-secondary btn-sm" onclick="enrollInClass('${cls.id}','${cls.name}',${access.price})">Inscribirse — ${Utils.formatCurrency(access.price)}</button>
        </div>`;
    } else {
      ctaButton = `
        <div>
          <div style="font-size:var(--font-size-xs);color:var(--color-success);margin-bottom:4px">✓ Incluida en tu plan</div>
          <button class="btn btn-primary btn-sm" onclick="enrollInClass('${cls.id}','${cls.name}',${cls.price||0})">Inscribirse</button>
        </div>`;
    }

    return `
    <div class="card" style="transition:box-shadow var(--transition)">
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:var(--space-3)">
          <h3 style="font-size:var(--font-size-base)">${cls.name}</h3>
          <span class="badge ${myEnroll?.status==='active'?'badge-success':isFull?'badge-warning':'badge-gray'}">${myEnroll?.status==='active'?'Inscrito':isFull&&!myEnroll?'Lleno':'Disponible'}</span>
        </div>
        <div style="font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:var(--space-3)">${cls.description||''}</div>
        <div style="display:flex;flex-direction:column;gap:var(--space-2);margin-bottom:var(--space-4)">
          <div style="display:flex;align-items:center;gap:var(--space-2);font-size:var(--font-size-sm)">
            <span>📅</span><span>${Utils.dayLabel(cls.schedule_day)} · ${Utils.formatTime(cls.schedule_time)} · ${cls.duration_minutes} min</span>
          </div>
          <div style="display:flex;align-items:center;gap:var(--space-2);font-size:var(--font-size-sm)">
            <span>📍</span><span>${cls.location}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-2);font-size:var(--font-size-sm)">
            ${renderClassStaff(cls,'xs')}
          </div>
        </div>
        <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-3)">
          ${(cls.plan_ids||[]).map(pid => Utils.planBadge(pid)).join('')}
          ${cls.min_group ? `<span style="font-size:var(--font-size-xs);color:var(--color-text-secondary)">Nivel mín: ${DB.getGroup(cls.min_group)?.name||''}</span>` : ''}
        </div>
        ${cls.max_students ? `
        <div style="margin-bottom:var(--space-3)">
          <div style="display:flex;justify-content:space-between;font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-bottom:4px">
            <span>${enrolled}/${cls.max_students} inscritos${waitlist>0?` · ${waitlist} en espera`:''}</span>
            <span>${pct}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill ${pct>=90?'danger':pct>=70?'warning':'success'}" style="width:${pct}%"></div></div>
        </div>` : ''}
        ${ctaButton}
      </div>
    </div>`;
  }

  const myActiveEnrollments = myEnrollments.filter(e => e.status === 'active' || e.status === 'waiting');

  const myEnrollmentRows = myActiveEnrollments.length === 0
    ? `<div class="empty-state"><div class="empty-state-icon">📚</div><h3>Sin inscripciones activas</h3><p>Ve a la pestaña "Explorar" para encontrar clases disponibles.</p></div>`
    : myActiveEnrollments.map(e => {
        const cls = DB.getClass(e.class_id);
        const pendingTxn = MOCK_DB.transactions.find(t => t.student_id === u.id && t.type === 'income' && t.status === 'pending');
        const attRecords = MOCK_DB.attendance.filter(a => a.class_id === e.class_id && a.user_id === u.id);
        const attRate = attRecords.length ? Math.round(attRecords.filter(a=>a.status==='present').length/attRecords.length*100) : 0;
        return `
        <tr>
          <td>
            <div style="font-weight:600">${cls?.name||'—'}</div>
            <div style="font-size:var(--font-size-xs);color:var(--color-text-secondary)">${cls?Utils.dayLabel(cls.schedule_day)+' · '+Utils.formatTime(cls.schedule_time):'—'}</div>
          </td>
          <td>${cls ? `<div style="display:flex;flex-wrap:wrap;align-items:center;gap:var(--space-2);font-size:var(--font-size-sm)">${renderClassStaff(cls,'xs')}</div>` : '—'}</td>
          <td>${e.status === 'waiting' ? `<span class="badge badge-warning">Espera #${e.waiting_position}</span>` : `<span class="badge badge-success">Activo</span>`}</td>
          <td>${pendingTxn ? `<span class="badge badge-warning">${pendingTxn.subcategory} · ${Utils.formatCurrency(pendingTxn.amount)}</span>` : `<span class="badge badge-success">Al corriente</span>`}</td>
          <td>${attRecords.length > 0 ? `<span style="font-weight:600;color:${attRate>=80?'var(--color-success)':attRate>=60?'var(--color-warning)':'var(--color-danger)'}">${attRate}%</span>` : '—'}</td>
          <td>
            <div class="actions">
              ${pendingTxn ? `<button class="btn btn-primary btn-xs" onclick="openPayModal('${pendingTxn.id}','${pendingTxn.subcategory}',${pendingTxn.amount})">Pagar</button>` : ''}
              <button class="btn btn-outline-danger btn-xs" onclick="cancelEnroll('${e.id}','${cls?.name}')">Cancelar</button>
            </div>
          </td>
        </tr>`;
      }).join('');

  return `
  <div class="page-header">
    <h2 class="page-title">Clases</h2>
    <p class="page-subtitle">Explora y gestiona tus inscripciones · Tu plan: ${u.plan_id ? Utils.planBadge(u.plan_id) : '<span style="color:var(--color-text-secondary)">Sin plan asignado</span>'}</p>
  </div>

  <div class="tabs" id="class-tabs">
    <button class="tab active" data-tab="tab-explore">🔍 Explorar clases</button>
    <button class="tab" data-tab="tab-enrolled">📋 Mis inscripciones (${myActiveEnrollments.length})</button>
  </div>

  <div id="tab-explore" class="tab-content active">
    ${availableClasses.length === 0
      ? `<div class="empty-state"><div class="empty-state-icon">📚</div><h3>No hay clases disponibles</h3><p>No hay clases activas en este momento.</p></div>`
      : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:var(--space-5)">${availableClasses.map(cls => buildClassCard(cls, myEnrollments.find(e=>e.class_id===cls.id))).join('')}</div>`}
  </div>

  <div id="tab-enrolled" class="tab-content">
    <div class="table-wrapper">
      <div class="table-responsive">
        <table class="table">
          <thead><tr><th>Clase</th><th>Instructor</th><th>Estado</th><th>Pago</th><th>Asistencia</th><th style="text-align:right">Acciones</th></tr></thead>
          <tbody>${myEnrollmentRows}</tbody>
        </table>
      </div>
    </div>
  </div>`;
}

/* ================================================================
   INSTRUCTOR VIEW
   ================================================================ */
function buildInstructorClasses(u) {
  const myClasses = DB.getInstructorClasses(u.id);
  const dayNames = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const todayDay = dayNames[new Date().getDay()];

  const classItems = myClasses.length === 0
    ? `<div class="empty-state"><div class="empty-state-icon">🧑‍🏫</div><h3>Sin clases asignadas</h3><p>El administrador te asignará clases próximamente.</p></div>`
    : myClasses.map(cls => {
        const enrolled = DB.getEnrollmentsForClass(cls.id);
        const isToday = cls.schedule_day === todayDay;
        const todayAtt = MOCK_DB.attendance.filter(a => a.class_id === cls.id && a.session_date === new Date().toISOString().split('T')[0]);
        const hasAttendanceToday = todayAtt.length > 0;
        return `
        <div class="card" style="margin-bottom:var(--space-4)">
          <div class="card-header">
            <div>
              <h3 style="display:flex;align-items:center;gap:var(--space-2)">
                ${cls.name}
                ${isToday ? '<span class="badge badge-primary">HOY</span>' : ''}
              </h3>
              <div style="font-size:var(--font-size-sm);color:var(--color-text-secondary);margin-top:4px">
                📅 ${Utils.dayLabel(cls.schedule_day)} · ${Utils.formatTime(cls.schedule_time)} · ${cls.duration_minutes} min &nbsp;|&nbsp;
                📍 ${cls.location}
              </div>
              ${(()=>{
                const coLeads = (cls.instructor_ids||[]).filter(id=>id!==u.id).map(id=>DB.getUser(id)).filter(Boolean);
                const assts = (cls.assistant_ids||[]).map(id=>DB.getUser(id)).filter(Boolean);
                const isAsst = (cls.assistant_ids||[]).includes(u.id);
                const parts = [];
                if (isAsst) parts.push('<strong style="color:var(--color-warning)">Tu rol: Asistente</strong>');
                if (coLeads.length) parts.push('Co-instructor: '+coLeads.map(i=>i.first_name+' '+i.last_name).join(', '));
                if (!isAsst && assts.length) parts.push('Asistente: '+assts.map(a=>a.first_name+' '+a.last_name).join(', '));
                return parts.length ? `<div style="font-size:var(--font-size-xs);color:var(--color-text-secondary);margin-top:3px">👥 ${parts.join(' · ')}</div>` : '';
              })()}
            </div>
            <div style="display:flex;gap:var(--space-2)">
              ${isToday && !hasAttendanceToday ? `<button class="btn btn-primary btn-sm" onclick="openAttModal('${cls.id}')">📋 Tomar asistencia</button>` : ''}
              ${hasAttendanceToday ? `<button class="btn btn-success btn-sm" onclick="openAttModal('${cls.id}')">✅ Asistencia tomada · Editar</button>` : ''}
              ${!isToday ? `<button class="btn btn-outline btn-sm" onclick="openAttModal('${cls.id}')">📋 Asistencia</button>` : ''}
            </div>
          </div>
          <div class="card-body" style="padding-top:var(--space-4)">
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:var(--space-4);margin-bottom:var(--space-4)">
              <div style="text-align:center">
                <div style="font-size:var(--font-size-2xl);font-weight:700">${enrolled.length}</div>
                <div style="font-size:var(--font-size-xs);color:var(--color-text-secondary)">Inscritos de ${cls.max_students||'∞'}</div>
              </div>
              <div style="text-align:center">
                <div style="font-size:var(--font-size-2xl);font-weight:700">${todayAtt.filter(a=>a.status==='present').length}</div>
                <div style="font-size:var(--font-size-xs);color:var(--color-text-secondary)">Presentes hoy</div>
              </div>
              <div style="text-align:center">
                <div style="font-size:var(--font-size-2xl);font-weight:700">${(cls.plan_ids||[]).length}</div>
                <div style="font-size:var(--font-size-xs);color:var(--color-text-secondary)">Planes</div>
              </div>
            </div>

            ${enrolled.length > 0 ? `
            <div style="border-top:1px solid var(--color-border);padding-top:var(--space-4)">
              <div style="font-size:var(--font-size-sm);font-weight:600;margin-bottom:var(--space-3)">Roster de alumnos</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--space-3)">
                ${enrolled.map(e => {
                  const student = DB.getUser(e.student_id);
                  if (!student) return '';
                  const attRecords = MOCK_DB.attendance.filter(a => a.class_id === cls.id && a.user_id === student.id);
                  const rate = attRecords.length ? Math.round(attRecords.filter(a=>a.status==='present').length/attRecords.length*100) : 0;
                  return `
                  <div style="display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2);border-radius:var(--radius);background:var(--color-gray-50)">
                    ${Utils.avatarHtml(student,'sm')}
                    <div style="flex:1;min-width:0">
                      <div style="font-size:var(--font-size-xs);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${student.first_name} ${student.last_name}</div>
                      <div style="font-size:10px;color:${rate>=80?'var(--color-success)':rate>=60?'var(--color-warning)':'var(--color-danger)'}">${rate}% asistencia</div>
                    </div>
                  </div>`;
                }).join('')}
              </div>
            </div>` : ''}
          </div>
        </div>`;
      }).join('');

  return `
  <div class="page-header">
    <h2 class="page-title">Mis Clases</h2>
    <p class="page-subtitle">${myClasses.length} clases activas · ${myClasses.reduce((s,c)=>s+DB.getEnrollmentsForClass(c.id).length,0)} estudiantes en total</p>
  </div>
  ${classItems}`;
}

/* ================================================================
   ADMIN / RECEPTIONIST VIEW — module-level state
   ================================================================ */
const adminState = { filterStatus: 'all', filterLocation: '', calView: 'week', calColorBy: 'location', calOffset: 0, viewMode: 'split' };
const CAL_COLORS = ['#6366f1','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#ec4899','#84cc16'];
const CAL_DAY_KEYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const CAL_DAY_SHORT = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
const CAL_HOUR_START = 7;
const CAL_HOUR_END = 21;
const CAL_HOUR_PX = 44;

function getClassSessions(cls) {
  if (cls.schedule && cls.schedule.length) return cls.schedule;
  return [{ day: cls.schedule_day, time: cls.schedule_time }];
}

function renderClassStaff(cls, size) {
  const leads = (cls.instructor_ids||[]).map(id => DB.getUser(id)).filter(Boolean);
  const assts = (cls.assistant_ids||[]).map(id => DB.getUser(id)).filter(Boolean);
  let html = leads.map(u =>
    `<span style="display:inline-flex;align-items:center;gap:4px">${Utils.avatarHtml(u,size)}<span>${u.first_name} ${u.last_name}</span></span>`
  ).join(' ');
  if (assts.length) html += `<span style="font-size:var(--font-size-xs);color:var(--color-text-secondary);white-space:nowrap"> · Asist.: ${assts.map(u=>u.first_name+' '+u.last_name).join(', ')}</span>`;
  return html || '—';
}

function setAdminFilter(status, el) {
  adminState.filterStatus = status;
  document.querySelectorAll('#admin-status-chips .filter-chip').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  renderAdminTable();
  renderAdminCalendar();
  renderCompactClassList();
}

function setAdminLocation(val) {
  adminState.filterLocation = val;
  renderAdminTable();
  renderAdminCalendar();
  renderCompactClassList();
}

function setCalColorBy(val) {
  adminState.calColorBy = val;
  renderAdminCalendar();
}

function setCalView(view) {
  adminState.calView = view;
  adminState.calOffset = 0;
  document.querySelectorAll('.cal-view-btn').forEach(b => {
    const on = b.dataset.view === view;
    b.style.background = on ? 'var(--color-primary)' : '';
    b.style.color = on ? '#fff' : '';
  });
  renderAdminCalendar();
}

function calNav(dir) {
  adminState.calOffset += dir;
  renderAdminCalendar();
}

function filteredAdminClasses() {
  return MOCK_DB.classes.filter(c => {
    if (adminState.filterStatus !== 'all' && c.status !== adminState.filterStatus) return false;
    if (adminState.filterLocation && c.location !== adminState.filterLocation) return false;
    return true;
  });
}

function getClassColor(cls) {
  let key;
  if (adminState.calColorBy === 'location') key = cls.location;
  else if (adminState.calColorBy === 'plan') key = (cls.plan_ids||[])[0] || '';
  else key = cls.instructor_id;
  const allKeys = [...new Set(MOCK_DB.classes.map(c =>
    adminState.calColorBy === 'location' ? c.location :
    adminState.calColorBy === 'plan' ? ((c.plan_ids||[])[0] || '') : c.instructor_id
  ))];
  return CAL_COLORS[allKeys.indexOf(key) % CAL_COLORS.length] || CAL_COLORS[0];
}

function renderCalLegend() {
  const seen = new Map();
  MOCK_DB.classes.forEach(c => {
    const key = adminState.calColorBy === 'location' ? c.location :
                adminState.calColorBy === 'plan' ? ((c.plan_ids||[])[0] ? (DB.getPlan((c.plan_ids||[])[0])?.name || '—') : '—') :
                (DB.getUser(c.instructor_id) ? DB.getUser(c.instructor_id).first_name + ' ' + DB.getUser(c.instructor_id).last_name : '—');
    if (!seen.has(key)) seen.set(key, getClassColor(c));
  });
  return [...seen.entries()].map(([label, color]) =>
    `<span style="display:inline-flex;align-items:center;gap:4px;font-size:var(--font-size-xs)"><span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></span>${label}</span>`
  ).join('');
}

function renderAdminCalendar() {
  const el = document.getElementById('admin-calendar');
  if (!el) return;
  const legendEl = document.getElementById('cal-legend');
  if (legendEl) legendEl.innerHTML = renderCalLegend();
  if (adminState.calView === 'week') renderWeekView(el);
  else renderMonthView(el);
}

function renderWeekView(el) {
  const classes = filteredAdminClasses().filter(c => c.status === 'active');
  const totalH = (CAL_HOUR_END - CAL_HOUR_START) * CAL_HOUR_PX;

  // Compute Monday of the current week + offset
  const now = new Date();
  const todayDow = (now.getDay() + 6) % 7; // Monday=0
  const monday = new Date(now);
  monday.setDate(now.getDate() - todayDow + adminState.calOffset * 7);

  const weekDates = CAL_DAY_KEYS.map((_, i) => { const d = new Date(monday); d.setDate(monday.getDate() + i); return d; });
  const weekLabel = `${weekDates[0].getDate()} ${weekDates[0].toLocaleDateString('es-MX',{month:'short'})} – ${weekDates[6].getDate()} ${weekDates[6].toLocaleDateString('es-MX',{month:'short',year:'numeric'})}`;
  const monthLabel = document.getElementById('cal-month-label');
  if (monthLabel) monthLabel.textContent = weekLabel;

  const hours = [];
  for (let h = CAL_HOUR_START; h <= CAL_HOUR_END; h++) {
    hours.push(`<div style="height:${CAL_HOUR_PX}px;border-bottom:1px solid var(--color-border);display:flex;align-items:flex-start;padding-top:2px;font-size:10px;color:var(--color-text-secondary)">${String(h).padStart(2,'0')}:00</div>`);
  }

  const todayStr = now.toISOString().split('T')[0];
  const dayCols = CAL_DAY_KEYS.map((day, di) => {
    const dayClasses = classes.filter(c => getClassSessions(c).some(s => s.day === day));
    const dateStr = weekDates[di].toISOString().split('T')[0];
    const isToday = dateStr === todayStr;
    const events = dayClasses.map(cls => {
      const sessions = getClassSessions(cls).filter(s => s.day === day);
      const color = getClassColor(cls);
      const instructor = DB.getUser((cls.instructor_ids||[])[0]);
      return sessions.map(session => {
        const [hh, mm] = session.time.split(':').map(Number);
        const top = (hh + mm / 60 - CAL_HOUR_START) * CAL_HOUR_PX;
        const height = Math.max(22, cls.duration_minutes / 60 * CAL_HOUR_PX - 2);
        return `<div title="${cls.name} · ${Utils.formatTime(session.time)} · ${cls.duration_minutes}min" style="position:absolute;top:${top}px;left:2px;right:2px;height:${height}px;background:${color};border-radius:4px;padding:2px 4px;overflow:hidden;cursor:pointer;opacity:0.9" onclick="openEditClassModal('${cls.id}')">
          <div style="font-size:10px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cls.name}</div>
          ${height > 28 ? `<div style="font-size:9px;color:rgba(255,255,255,0.85)">${Utils.formatTime(session.time)}${instructor?' · '+instructor.first_name:''}</div>` : ''}
        </div>`;
      }).join('');
    }).join('');
    return `<div style="flex:1;min-width:0;border-left:1px solid var(--color-border)">

function renderMonthView(el) {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + adminState.calOffset;
  const d = new Date(year, month, 1);
  const displayMonth = d.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });

  const monthLabel = document.getElementById('cal-month-label');
  if (monthLabel) monthLabel.textContent = displayMonth.charAt(0).toUpperCase() + displayMonth.slice(1);

  const firstDow = (d.getDay() + 6) % 7; // Monday=0
  const daysInMonth = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
  const classes = filteredAdminClasses().filter(c => c.status === 'active');

  const dayOfWeekToIndex = { monday:0, tuesday:1, wednesday:2, thursday:3, friday:4, saturday:5, sunday:6 };
  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(`<div style="border:1px solid var(--color-border);min-height:80px;background:var(--color-gray-50)"></div>`);
  for (let day = 1; day <= daysInMonth; day++) {
    const dow = (firstDow + day - 1) % 7;
    const dayClasses = classes.filter(c => getClassSessions(c).some(s => dayOfWeekToIndex[s.day] === dow));
    const chips = dayClasses.map(cls => {
      const color = getClassColor(cls);
      return `<div style="background:${color};color:#fff;border-radius:3px;padding:1px 4px;font-size:9px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer" onclick="openEditClassModal('${cls.id}')" title="${cls.name}">${cls.name}</div>`;
    }).join('');
    cells.push(`<div style="border:1px solid var(--color-border);min-height:80px;padding:4px">
      <div style="font-size:var(--font-size-xs);font-weight:600;margin-bottom:4px">${day}</div>
      ${chips}
    </div>`);
  }

  const headers = CAL_DAY_SHORT.map(d => `<div style="text-align:center;font-size:var(--font-size-xs);font-weight:600;padding:6px;background:var(--color-gray-50);border:1px solid var(--color-border)">${d}</div>`).join('');
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(7,1fr)">${headers}${cells.join('')}</div>`;
}

    }
    document.getElementById('enroll-confirm-btn').onclick = doEnroll;
    Utils.openModal('enroll-confirm-modal');
  })();

function doEnroll() {
  const modal = document.getElementById('enroll-confirm-modal');
  const enrollment = DB.enrollStudent(user.id, modal._classId);
  if (enrollment.status === 'waiting') {
    Utils.toast('En lista de espera', `Posición #${enrollment.waiting_position}. Te notificaremos cuando haya espacio.`, 'warning');
  } else {
    Utils.toast('Inscripción exitosa', 'Ya estás inscrito en esta clase. El cobro se reflejará en tu próxima mensualidad.', 'success');
  }
  Utils.closeModal('enroll-confirm-modal');
  setTimeout(() => location.reload(), 700);
}

    </div>`;
  updateAttcSummary();
  Utils.openModal('att-modal-c');
}

function setAttC(btn) {
  const modal = document.getElementById('att-modal-c');
  const studentId = btn.dataset.st;
  const val = btn.dataset.val;
  modal._attendance[studentId] = val;
  const row = document.getElementById('attc-' + studentId);
  if (row) {
    row.querySelectorAll('.attc-btn').forEach(b => { b.classList.remove('btn-success','btn-danger','btn-secondary'); b.classList.add('btn-outline'); });
    btn.classList.remove('btn-outline');
    if (val === 'present') btn.classList.add('btn-success');
    else if (val === 'absent') btn.classList.add('btn-danger');
    else btn.classList.add('btn-secondary');
  }
  updateAttcSummary();
}

function updateAttcSummary() {
  const modal = document.getElementById('att-modal-c');
  const el = document.getElementById('attc-summary');
  if (!el || !modal) return;
  const vals = Object.values(modal._attendance || {});
  el.textContent = `${vals.filter(v=>v==='present').length} presentes · ${vals.filter(v=>v==='absent').length} ausentes · ${vals.filter(v=>v==='excused').length} justificados`;
}

function saveAttC() {
  const modal = document.getElementById('att-modal-c');
  const date = document.getElementById('attc-date').value;
  Object.entries(modal._attendance).forEach(([userId, status]) => {
    const ex = MOCK_DB.attendance.find(a => a.class_id === modal._classId && a.user_id === userId && a.session_date === date);
    if (ex) { ex.status = status; } else {
      MOCK_DB.attendance.push({ id:'att_x'+Date.now(), class_id:modal._classId, user_id:userId, session_date:date, status, notes:null, created_at:new Date().toISOString() });
    }
  });
  Utils.closeModal('att-modal-c');
  Utils.toast('Asistencia guardada', `Sesión del ${Utils.formatDate(date)} registrada.`, 'success');
  setTimeout(() => location.reload(), 700);
}

function createClass() {
  const name = document.getElementById('nc-name').value.trim();
  if (!name) { Utils.toast('Campo requerido', 'El nombre de la clase es obligatorio.', 'error'); return; }
  const id = 'class_' + String(MOCK_DB.classes.length + 1).padStart(3,'0');
  const planIds = [...document.querySelectorAll('.nc-plan-cb:checked')].map(cb => cb.value);
  const groupIds = [...document.querySelectorAll('.nc-group-cb:checked')].map(cb => cb.value);
  const minGroup = document.getElementById('nc-mingroup')?.value || null;
  const sessions = [...document.querySelectorAll('#nc-sessions .nc-session-row')].map(row => ({
    day: row.querySelector('.nc-day-sel').value,
    time: row.querySelector('.nc-time-sel').value
  }));
  const firstSession = sessions[0] || { day: 'monday', time: '10:00' };
  MOCK_DB.classes.push({
    id, academy_id:'acad_001', name, description: document.getElementById('nc-desc').value,
    instructor_ids: [...document.querySelectorAll('.nc-inst-cb:checked')].map(cb=>cb.value),
    assistant_ids: [...document.querySelectorAll('.nc-asst-cb:checked')].map(cb=>cb.value),
    status:'active', recurrence:'weekly',
    schedule_day: firstSession.day, schedule_time: firstSession.time,
    schedule: sessions,
    duration_minutes: parseInt(document.getElementById('nc-duration').value)||60,
    max_students: parseInt(document.getElementById('nc-capacity').value)||15,
    price: parseFloat(document.getElementById('nc-price').value)||0,
    location: document.getElementById('nc-location').value,
    plan_ids: planIds, min_group: minGroup || null, groups: groupIds,
    created_at: new Date().toISOString()
  });
  Utils.closeModal('new-class-modal');
  Utils.toast('Clase creada', `La clase "${name}" fue creada exitosamente.`, 'success');
  setTimeout(() => location.reload(), 700);
}

  if (ecRows.length > 1) ecRows.forEach(r => r.querySelector('.ec-remove-row').style.visibility = '');

  // Checkboxes
  document.querySelectorAll('.ec-plan-cb').forEach(cb => { cb.checked = (cls.plan_ids||[]).includes(cb.value); });
  document.querySelectorAll('.ec-group-cb').forEach(cb => { cb.checked = (cls.groups||[]).includes(cb.value); });

  document.getElementById('ec-save-btn').onclick = () => saveEditClass(classId);
  Utils.openModal('edit-class-modal');
}

function saveEditClass(classId) {
  const name = document.getElementById('ec-name').value.trim();
  if (!name) { Utils.toast('Campo requerido', 'El nombre es obligatorio.', 'error'); return; }
  const cls = DB.getClass(classId);
  if (!cls) return;

  const sessions = [...document.querySelectorAll('#ec-sessions .ec-session-row')].map(row => ({
    day: row.querySelector('.ec-day-sel').value,
    time: row.querySelector('.ec-time-sel').value
  }));
  const first = sessions[0] || { day: 'monday', time: '10:00' };

  cls.name            = name;
  cls.instructor_ids  = [...document.querySelectorAll('.ec-inst-cb:checked')].map(cb=>cb.value);
  cls.assistant_ids   = [...document.querySelectorAll('.ec-asst-cb:checked')].map(cb=>cb.value);
  cls.duration_minutes= parseInt(document.getElementById('ec-duration').value) || 60;
  cls.max_students    = parseInt(document.getElementById('ec-capacity').value) || null;
  cls.price           = parseFloat(document.getElementById('ec-price').value) || 0;
  cls.location        = document.getElementById('ec-location').value;
  cls.description     = document.getElementById('ec-desc').value;
  cls.status          = document.getElementById('ec-status').value;
  cls.min_group       = document.getElementById('ec-mingroup').value || null;
  cls.schedule_day    = first.day;
  cls.schedule_time   = first.time;
  cls.schedule        = sessions;
  cls.plan_ids        = [...document.querySelectorAll('.ec-plan-cb:checked')].map(cb => cb.value);
  cls.groups          = [...document.querySelectorAll('.ec-group-cb:checked')].map(cb => cb.value);

  Utils.closeModal('edit-class-modal');
  Utils.toast('Clase actualizada', `"${name}" guardada.`, 'success');
  renderAdminTable();
  renderAdminCalendar();
  renderCompactClassList();
}
</script>
</body>
</html>
