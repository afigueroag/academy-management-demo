<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudiantes — Academia</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<script src="../js/mock-data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
Auth.requireRole(['admin','receptionist']);
Utils.renderAppLayout('Estudiantes', 'students');

const user = Auth.getCurrentUser();

const state = {
  search: '',
  filterStatus: 'active',
  filterPlan: '',
  filterDebt: '',
  selectedStudent: null
};

function getStudents() {
  return MOCK_DB.users.filter(u => u.role === 'student');
}

function filteredStudents() {
  let list = getStudents();
  if (state.filterStatus === 'active') list = list.filter(u => u.is_active);
  else if (state.filterStatus === 'inactive') list = list.filter(u => !u.is_active);
  if (state.filterPlan) list = list.filter(u => u.plan_id === state.filterPlan);
  if (state.filterDebt === 'yes') list = list.filter(u => DB.getStudentDebt(u.id) > 0);
  else if (state.filterDebt === 'no') list = list.filter(u => DB.getStudentDebt(u.id) === 0);
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(u =>
      u.first_name.toLowerCase().includes(q) ||
      u.last_name.toLowerCase().includes(q) ||
      u.email.toLowerCase().includes(q) ||
      (u.phone && u.phone.includes(q))
    );
  }
  return list;
}

function getAvgAttendance() {
  const students = getStudents().filter(u => u.is_active);
  if (!students.length) return 0;
  const rates = students.map(u => DB.getAttendanceRate(u.id));
  return Math.round(rates.reduce((a,b) => a+b, 0) / rates.length);
}

function getNewThisMonth() {
  const now = new Date();
  return getStudents().filter(u => {
    const d = new Date(u.created_at);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
}

function renderPage() {
  const main = document.getElementById('app-main');
  const students = getStudents();
  const active = students.filter(u => u.is_active).length;
  const withDebt = students.filter(u => DB.getStudentDebt(u.id) > 0).length;
  const newMonth = getNewThisMonth();
  const avgAtt = getAvgAttendance();

  main.innerHTML = `
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-6)">
      <div>
        <h1 class="page-title">Estudiantes</h1>
        <p style="color:var(--color-text-muted);margin-top:var(--space-1)">Gestión de estudiantes inscritos</p>
      </div>
      <div style="display:flex;gap:var(--space-3)">
        <button class="btn btn-outline" onclick="openInvitePanel()">Invitar estudiante</button>
        <button class="btn btn-primary" onclick="openCreatePanel()">+ Crear estudiante</button>
      </div>
    </div>

    <div class="scorecard-grid" style="margin-bottom:var(--space-6)">
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Activos</span><span style="font-size:1.5rem">👥</span></div>
        <div class="scorecard-value">${active}</div>
        <div class="scorecard-trend trend-up">de ${students.length} totales</div>
      </div>
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Nuevos este mes</span><span style="font-size:1.5rem">✨</span></div>
        <div class="scorecard-value">${newMonth}</div>
        <div class="scorecard-trend trend-up">inscritos en mayo</div>
      </div>
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Con deuda</span><span style="font-size:1.5rem">⚠️</span></div>
        <div class="scorecard-value">${withDebt}</div>
        <div class="scorecard-trend trend-down">${withDebt > 0 ? 'requieren atención' : 'todo al corriente'}</div>
      </div>
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Asistencia promedio</span><span style="font-size:1.5rem">📊</span></div>
        <div class="scorecard-value">${avgAtt}%</div>
        <div class="scorecard-trend ${avgAtt >= 75 ? 'trend-up' : 'trend-down'}">últimas 4 semanas</div>
      </div>
    </div>

    <div class="card" style="padding:var(--space-5)">
      <div style="display:flex;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-4);align-items:center">
        <div class="search-input" style="flex:1;min-width:200px">
          <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
          <input type="text" class="search-field" placeholder="Buscar por nombre, email o teléfono…" oninput="state.search=this.value;renderTable()" value="${state.search}">
        </div>
        <select class="input select" style="width:auto" onchange="state.filterStatus=this.value;renderTable()">
          <option value="active" ${state.filterStatus==='active'?'selected':''}>Activos</option>
          <option value="inactive" ${state.filterStatus==='inactive'?'selected':''}>Inactivos</option>
          <option value="all" ${state.filterStatus==='all'?'selected':''}>Todos</option>
        </select>
        <select class="input select" style="width:auto" onchange="state.filterPlan=this.value;renderTable()">
          <option value="">Todos los planes</option>
          ${MOCK_DB.plans.map(p => `<option value="${p.id}" ${state.filterPlan===p.id?'selected':''}>${p.name}</option>`).join('')}
        </select>
        <select class="input select" style="width:auto" onchange="state.filterDebt=this.value;renderTable()">
          <option value="">Cualquier deuda</option>
          <option value="yes" ${state.filterDebt==='yes'?'selected':''}>Con deuda</option>
          <option value="no" ${state.filterDebt==='no'?'selected':''}>Sin deuda</option>
        </select>
      </div>
      <div id="students-table-wrap"></div>
    </div>

    <!-- Panel: Invitar -->
    <div class="side-panel-backdrop" id="invite-backdrop" onclick="closePanel('invite-panel')"></div>
    <div class="side-panel" id="invite-panel">
      <div class="side-panel-header">
        <h3>Invitar estudiante</h3>
        <button class="btn btn-ghost btn-icon" onclick="closePanel('invite-panel')">✕</button>
      </div>
      <div style="padding:var(--space-5)">
        <p style="color:var(--color-text-muted);margin-bottom:var(--space-5)">Se enviará un correo de invitación con un enlace para completar el registro.</p>
        <div class="form-group">
          <label class="label">Nombre</label>
          <input type="text" id="inv-name" class="input" placeholder="Nombre completo">
        </div>
        <div class="form-group">
          <label class="label">Correo electrónico</label>
          <input type="email" id="inv-email" class="input" placeholder="estudiante@ejemplo.com">
        </div>
        <div class="form-group">
          <label class="label">Plan de membresía</label>
          <select id="inv-cat" class="input select">
            <option value="">Sin asignar</option>
            ${MOCK_DB.plans.filter(p=>p.is_active).map(p => `<option value="${p.id}">${p.name} — ${Utils.formatCurrency(p.monthly_fee)}/mes</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="label">Mensaje personalizado (opcional)</label>
          <textarea id="inv-msg" class="input" rows="3" placeholder="Hola, te invitamos a unirte a nuestra academia…"></textarea>
        </div>
        <button class="btn btn-primary btn-block" onclick="sendInvite()">Enviar invitación</button>
      </div>
    </div>

    <!-- Panel: Crear estudiante -->
    <div class="side-panel-backdrop" id="create-backdrop" onclick="closePanel('create-panel')"></div>
    <div class="side-panel" id="create-panel">
      <div class="side-panel-header">
        <h3>Crear estudiante</h3>
        <button class="btn btn-ghost btn-icon" onclick="closePanel('create-panel')">✕</button>
      </div>
      <div style="padding:var(--space-5);overflow-y:auto;max-height:calc(100vh - 80px)">
        <div class="form-row">
          <div class="form-group">
            <label class="label">Nombre</label>
            <input type="text" id="cr-first" class="input" placeholder="Nombre">
          </div>
          <div class="form-group">
            <label class="label">Apellido</label>
            <input type="text" id="cr-last" class="input" placeholder="Apellido">
          </div>
        </div>
        <div class="form-group">
          <label class="label">Correo electrónico</label>
          <input type="email" id="cr-email" class="input" placeholder="estudiante@ejemplo.com">
        </div>
        <div class="form-group">
          <label class="label">Teléfono</label>
          <input type="tel" id="cr-phone" class="input" placeholder="+52 55 0000 0000">
        </div>
        <div class="form-group">
          <label class="label">Fecha de nacimiento</label>
          <input type="date" id="cr-dob" class="input">
        </div>
        <div class="form-group">
          <label class="label">Plan de membresía</label>
          <select id="cr-plan" class="input select">
            <option value="">Sin plan</option>
            ${MOCK_DB.plans.filter(p=>p.is_active).map(p => `<option value="${p.id}">${p.name} — ${Utils.formatCurrency(p.monthly_fee)}/mes</option>`).join('')}
          </select>
        </div>
        ${MOCK_DB.axes.map(axis => `
        <div class="form-group">
          <label class="label">${axis.name}${axis.ordered ? ' <span style="font-size:11px;color:var(--color-text-muted)">(ordenado)</span>' : ''}</label>
          <div style="display:flex;flex-wrap:wrap;gap:var(--space-2)">
            <label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 10px;border-radius:9999px;border:1px solid var(--color-border)">
              <input type="radio" name="cr-grp-${axis.id}" value="" checked style="margin:0">
              <span style="font-size:var(--text-sm);color:var(--color-text-muted)">Sin asignar</span>
            </label>
            ${DB.getGroupsByAxis(axis.id).map(g => `<label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 10px;border-radius:9999px;border:1px solid ${g.color}44;background:${g.color}11">
              <input type="radio" name="cr-grp-${axis.id}" value="${g.id}" style="accent-color:${g.color};margin:0">
              <span style="font-size:var(--text-sm);color:${g.color};font-weight:500">${g.name}</span>
            </label>`).join('')}
          </div>
        </div>`).join('')}
        <div class="form-group">
          <label class="label">Fecha de inicio</label>
          <input type="date" id="cr-start" class="input">
        </div>
        <div class="form-group">
          <label class="label">Método de pago</label>
          <select id="cr-method" class="input select">
            <option value="cash">Efectivo</option>
            <option value="transfer">Transferencia</option>
            <option value="card">Tarjeta</option>
            <option value="stripe">Stripe</option>
          </select>
        </div>
        <div class="form-group">
          <label class="label">Dirección</label>
          <input type="text" id="cr-addr" class="input" placeholder="Colonia, Ciudad">
        </div>
        <div class="form-group">
          <label class="label">Condiciones especiales</label>
          <textarea id="cr-conditions" class="input" rows="3" placeholder="Lesiones recientes, enfermedades, limitaciones físicas que el instructor deba considerar…" style="resize:vertical"></textarea>
        </div>
        <button class="btn btn-primary btn-block" onclick="createStudent()">Crear estudiante</button>
      </div>
    </div>

    <!-- Panel: Ver/editar estudiante -->
    <div class="side-panel-backdrop" id="view-backdrop" onclick="closePanel('view-panel')"></div>
    <div class="side-panel" id="view-panel" style="width:480px">
      <div class="side-panel-header">
        <h3 id="view-panel-title">Estudiante</h3>
        <button class="btn btn-ghost btn-icon" onclick="closePanel('view-panel')">✕</button>
      </div>
      <div id="view-panel-body" style="padding:var(--space-5)"></div>
    </div>

    <!-- Panel: Editar estudiante -->
    <div class="side-panel-backdrop" id="edit-backdrop" onclick="closePanel('edit-panel')"></div>
    <div class="side-panel" id="edit-panel" style="width:480px">
      <div class="side-panel-header">
        <h3 id="edit-panel-title">Editar estudiante</h3>
        <button class="btn btn-ghost btn-icon" onclick="closePanel('edit-panel')">✕</button>
      </div>
      <div id="edit-panel-body" style="padding:var(--space-5);overflow-y:auto;max-height:calc(100vh - 80px)"></div>
    </div>

    <!-- Modal: Registrar pago / Cambiar categoría -->
    <div class="modal-backdrop" id="pay-modal" onclick="if(event.target===this)closeModal('pay-modal')">
      <div class="modal" style="max-width:440px">
        <div class="modal-header">
          <h3 class="modal-title" id="pay-modal-title">Registrar pago</h3>
          <button class="modal-close" onclick="closeModal('pay-modal')">✕</button>
        </div>
        <div id="pay-modal-body" class="modal-body"></div>
      </div>
    </div>
  `;

  renderTable();
}

function renderTable() {
  const list = filteredStudents();
  const wrap = document.getElementById('students-table-wrap');
  if (!wrap) return;
  if (!list.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Sin resultados</div><div class="empty-desc">No hay estudiantes que coincidan con los filtros aplicados.</div></div>`;
    return;
  }
  wrap.innerHTML = `
    <div class="table-responsive">
      <table class="table">
        <thead><tr>
          <th>Estudiante</th>
          <th>Plan / Grupos</th>
          <th>Clases</th>
          <th>Deuda</th>
          <th>Asistencia</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr></thead>
        <tbody>
          ${list.map(s => {
            const debt = DB.getStudentDebt(s.id);
            const att = DB.getAttendanceRate(s.id);
            const enrolls = DB.getEnrollmentsForStudent(s.id).filter(e => e.status === 'active').length;
            return `<tr>
              <td>
                <div style="display:flex;align-items:center;gap:var(--space-3)">
                  ${Utils.avatarHtml(s, 36)}
                  <div>
                    <div style="font-weight:500">${s.first_name} ${s.last_name}</div>
                    <div style="font-size:var(--text-xs);color:var(--color-text-muted)">${s.email}</div>
                  </div>
                </div>
              </td>
              <td>
                <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center">
                  ${s.plan_id ? Utils.planBadge(s.plan_id) : '<span style="color:var(--color-text-muted);font-size:var(--text-xs)">Sin plan</span>'}
                  ${(s.groups||[]).map(gid => Utils.groupChip(gid)).join('')}
                </div>
              </td>
              <td><span style="font-weight:500">${enrolls}</span> activas</td>
              <td>${debt > 0 ? `<span style="color:var(--color-danger);font-weight:600">${Utils.formatCurrency(debt)}</span>` : '<span style="color:var(--color-success)">—</span>'}</td>
              <td>
                <div style="display:flex;align-items:center;gap:var(--space-2)">
                  <div style="width:60px;height:6px;background:var(--color-border);border-radius:3px;overflow:hidden">
                    <div style="width:${att}%;height:100%;background:${att>=75?'var(--color-success)':att>=50?'var(--color-warning)':'var(--color-danger)'}"></div>
                  </div>
                  <span style="font-size:var(--text-xs)">${att}%</span>
                </div>
              </td>
              <td><span class="badge ${s.is_active?'badge-success':'badge-default'}">${s.is_active?'Activo':'Inactivo'}</span></td>
              <td>
                <div class="actions">
                  <button class="btn btn-primary btn-xs" onclick="openPayModal('${s.id}')">Pagar</button>
                  <button class="btn btn-outline btn-xs" onclick="openEditPanel('${s.id}')">Editar</button>
                  <button class="btn btn-outline btn-xs" onclick="openViewPanel('${s.id}')">Ver detalles</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div style="color:var(--color-text-muted);font-size:var(--text-sm);padding:var(--space-3) 0">${list.length} estudiante${list.length!==1?'s':''} encontrado${list.length!==1?'s':''}</div>
  `;
}

function openInvitePanel() {
  document.getElementById('invite-backdrop').classList.add('open');
  document.getElementById('invite-panel').classList.add('open');
}
function openCreatePanel() {
  document.getElementById('create-backdrop').classList.add('open');
  document.getElementById('create-panel').classList.add('open');
}

function closePanel(id) {
  document.getElementById(id).classList.remove('open');
  const bd = id.replace('-panel','-backdrop');
  const el = document.getElementById(bd);
  if (el) el.classList.remove('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function sendInvite() {
  const name = document.getElementById('inv-name').value.trim();
  const email = document.getElementById('inv-email').value.trim();
  if (!name || !email) { Utils.toast('Campos requeridos','Completa nombre y correo','error'); return; }
  const token = 'inv_' + Math.random().toString(36).substr(2,10);
  MOCK_DB.invitations.push({ id:'inv_new_'+Date.now(), academy_id:'acad_001', email, role:'student', token, invited_by:'user_001', created_at:new Date().toISOString(), accepted_at:null });
  closePanel('invite-panel');
  const invUrl = window.location.origin + window.location.pathname.replace('students.html','accept-invitation.html') + '?token=' + token;
  Utils.showEmailPreview(email, 'Te invitamos a unirte a Academia Arte y Movimiento',
    `<p>Hola <strong>${name}</strong>,</p>
    <p>Has sido invitado a unirte a <strong>Academia Arte y Movimiento</strong> como estudiante.</p>
    <p>Haz clic en el botón de abajo para completar tu registro:</p>
    <p><a href="${invUrl}" style="background:#6366f1;color:white;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block">Aceptar invitación</a></p>
    <p style="color:#888;font-size:12px">Este enlace expira en 72 horas.</p>`
  );
}

function createStudent() {
  const first = document.getElementById('cr-first').value.trim();
  const last = document.getElementById('cr-last').value.trim();
  const email = document.getElementById('cr-email').value.trim();
  if (!first || !last || !email) { Utils.toast('Campos requeridos','Completa nombre, apellido y correo','error'); return; }
  const planId = document.getElementById('cr-plan').value;
  const groups = MOCK_DB.axes.map(ax => document.querySelector(`input[name="cr-grp-${ax.id}"]:checked`)?.value).filter(Boolean);
  const conditions = document.getElementById('cr-conditions').value.trim();
  const newUser = {
    id: 'user_' + (MOCK_DB.users.length + 1).toString().padStart(3,'0'),
    email, first_name: first, last_name: last,
    role: 'student',
    phone: document.getElementById('cr-phone').value,
    address: document.getElementById('cr-addr').value,
    date_of_birth: document.getElementById('cr-dob').value,
    is_active: true, hourly_rate: null, payroll_type: null,
    email_verified_at: new Date().toISOString(),
    created_at: new Date().toISOString(),
    start_date: document.getElementById('cr-start').value || new Date().toISOString().split('T')[0],
    payment_method: document.getElementById('cr-method').value,
    plan_id: planId || null,
    groups,
    conditions: conditions || null
  };
  MOCK_DB.users.push(newUser);
  closePanel('create-panel');
  Utils.toast('Estudiante creado', `${first} ${last} ha sido registrado`, 'success');
  renderPage();
}

function openViewPanel(userId) {
  const s = DB.getUser(userId);
  if (!s) return;
  state.selectedStudent = userId;
  document.getElementById('view-panel-title').textContent = `${s.first_name} ${s.last_name}`;
  const debt = DB.getStudentDebt(s.id);
  const att = DB.getAttendanceRate(s.id);
  const enrolls = DB.getEnrollmentsForStudent(s.id).filter(e => e.status==='active');
  const txns = MOCK_DB.transactions.filter(t => t.student_id === s.id).slice(0,6);
  const pendingTxns = MOCK_DB.transactions.filter(t => t.student_id === s.id && t.type === 'income' && t.status === 'pending');
  const statusLabel = { succeeded: 'Pagado', pending: 'Pendiente', failed: 'Fallido', refunded: 'Reembolsado' };
  const statusColor = { succeeded: 'var(--color-success)', pending: 'var(--color-warning)', failed: 'var(--color-danger)', refunded: 'var(--color-text-muted)' };
  document.getElementById('view-panel-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-5)">
      ${Utils.avatarHtml(s, 56)}
      <div>
        <div style="font-weight:600;font-size:var(--text-lg)">${s.first_name} ${s.last_name}</div>
        <div style="color:var(--color-text-muted);font-size:var(--text-sm)">${s.email}</div>
        <div style="margin-top:var(--space-2);display:flex;flex-wrap:wrap;gap:4px">
          ${s.plan_id ? Utils.planBadge(s.plan_id) : '<span style="color:var(--color-text-muted);font-size:var(--text-xs)">Sin plan</span>'}
          ${(s.groups||[]).map(gid => Utils.groupChip(gid)).join('')}
        </div>
      </div>
    </div>
    ${s.conditions ? `<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:var(--radius-md);padding:var(--space-3);margin-bottom:var(--space-5);display:flex;gap:var(--space-2)"><span>⚠️</span><div><strong style="font-size:var(--text-sm)">Condiciones especiales:</strong><p style="margin:var(--space-1) 0 0;font-size:var(--text-sm);color:#92400e">${s.conditions}</p></div></div>` : ''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-5)">
      <div style="background:var(--color-bg);padding:var(--space-3);border-radius:var(--radius-md)">
        <div style="font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-1)">Deuda pendiente</div>
        <div style="font-size:var(--text-xl);font-weight:700;color:${debt>0?'var(--color-danger)':'var(--color-success)'};margin-bottom:${debt>0?'var(--space-2)':'0'}">${debt>0?Utils.formatCurrency(debt):'Sin deuda'}</div>
        ${pendingTxns.map(t => `
          <div style="display:flex;justify-content:space-between;align-items:center;background:#fef3c7;border:1px solid #fde68a;border-radius:3px;padding:2px 6px;margin-top:3px;font-size:11px">
            <span style="color:#92400e">${t.subcategory}${t.notes?' · '+t.notes:''}</span>
            <span style="font-weight:600;color:#92400e;white-space:nowrap;margin-left:4px">${Utils.formatCurrency(t.amount)}</span>
          </div>`).join('')}
      </div>
      <div style="background:var(--color-bg);padding:var(--space-3);border-radius:var(--radius-md)">
        <div style="font-size:var(--text-xs);color:var(--color-text-muted)">Asistencia</div>
        <div style="font-size:var(--text-xl);font-weight:700">${att}%</div>
      </div>
    </div>
    <div style="margin-bottom:var(--space-4)">
      <div style="font-weight:600;margin-bottom:var(--space-3)">Clases inscritas (${enrolls.length})</div>
      ${enrolls.length ? enrolls.map(e => {
        const cls = DB.getClass(e.class_id);
        return cls ? `<div style="display:flex;align-items:center;justify-content:space-between;padding:var(--space-2) 0;border-bottom:1px solid var(--color-border)"><span>${cls.name}</span><span style="font-size:var(--text-xs);color:var(--color-text-muted)">${Utils.dayLabel(cls.schedule_day)} ${cls.schedule_time}</span></div>` : '';
      }).join('') : '<p style="color:var(--color-text-muted);font-size:var(--text-sm)">Sin inscripciones activas</p>'}
    </div>
    <div style="margin-bottom:var(--space-5)">
      <div style="font-weight:600;margin-bottom:var(--space-3)">Últimas transacciones</div>
      ${txns.length ? txns.map(t => `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;padding:var(--space-2) 0;border-bottom:1px solid var(--color-border)">
          <div>
            <div style="font-size:var(--text-sm)">${t.subcategory || '—'}${t.notes?' <span style="color:var(--color-text-muted)">· '+t.notes+'</span>':''}</div>
            <div style="font-size:11px;color:var(--color-text-muted)">${Utils.formatDate(t.due_date||t.created_at)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;margin-left:var(--space-2)">
            <div style="font-weight:600;color:${statusColor[t.status]||'inherit'}">${Utils.formatCurrency(t.amount)}</div>
            <div style="font-size:10px;color:${statusColor[t.status]||'inherit'}">${statusLabel[t.status]||t.status}</div>
          </div>
        </div>
      `).join('') : '<p style="color:var(--color-text-muted);font-size:var(--text-sm)">Sin transacciones</p>'}
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--space-3)">
      ${debt > 0 ? `<button class="btn btn-primary" onclick="openPayModal('${s.id}');closePanel('view-panel')">Registrar pago — ${Utils.formatCurrency(debt)}</button>` : ''}
      <button class="btn btn-outline" onclick="openEditPanel('${s.id}');closePanel('view-panel')">Editar estudiante</button>
    </div>
  `;
  document.getElementById('view-backdrop').classList.add('open');
  document.getElementById('view-panel').classList.add('open');
}

function openEditPanel(userId) {
  const s = DB.getUser(userId);
  if (!s) return;
  document.getElementById('edit-panel-title').textContent = `Editar — ${s.first_name} ${s.last_name}`;
  const methodMap = { cash:'Efectivo', transfer:'Transferencia', card:'Tarjeta', stripe:'Stripe' };
  document.getElementById('edit-panel-body').innerHTML = `
    <div class="form-row">
      <div class="form-group">
        <label class="label">Nombre</label>
        <input type="text" id="ed-first" class="input" value="${s.first_name}">
      </div>
      <div class="form-group">
        <label class="label">Apellido</label>
        <input type="text" id="ed-last" class="input" value="${s.last_name}">
      </div>
    </div>
    <div class="form-group">
      <label class="label">Correo electrónico</label>
      <input type="email" id="ed-email" class="input" value="${s.email}">
    </div>
    <div class="form-group">
      <label class="label">Teléfono</label>
      <input type="tel" id="ed-phone" class="input" value="${s.phone||''}">
    </div>
    <div class="form-group">
      <label class="label">Fecha de nacimiento</label>
      <input type="date" id="ed-dob" class="input" value="${s.date_of_birth||''}">
    </div>
    <div class="form-group">
      <label class="label">Plan de membresía</label>
      <select id="ed-plan" class="input select">
        <option value="">Sin plan</option>
        ${MOCK_DB.plans.map(p => `<option value="${p.id}" ${s.plan_id===p.id?'selected':''}>${p.name} — ${Utils.formatCurrency(p.monthly_fee)}/mes${p.is_active?'':' (archivado)'}</option>`).join('')}
      </select>
    </div>
    ${MOCK_DB.axes.map(axis => `
    <div class="form-group">
      <label class="label">${axis.name}${axis.ordered ? ' <span style="font-size:11px;color:var(--color-text-muted)">(ordenado)</span>' : ''}</label>
      <div style="display:flex;flex-wrap:wrap;gap:var(--space-2)">
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 10px;border-radius:9999px;border:1px solid var(--color-border)">
          <input type="radio" name="ed-grp-${axis.id}" value="" ${!(s.groups||[]).find(gid => DB.getGroupsByAxis(axis.id).some(g => g.id===gid)) ? 'checked' : ''} style="margin:0">
          <span style="font-size:var(--text-sm);color:var(--color-text-muted)">Sin asignar</span>
        </label>
        ${DB.getGroupsByAxis(axis.id).map(g => `<label style="display:flex;align-items:center;gap:4px;cursor:pointer;padding:3px 10px;border-radius:9999px;border:1px solid ${g.color}44;background:${g.color}11">
          <input type="radio" name="ed-grp-${axis.id}" value="${g.id}" ${(s.groups||[]).includes(g.id) ? 'checked' : ''} style="accent-color:${g.color};margin:0">
          <span style="font-size:var(--text-sm);color:${g.color};font-weight:500">${g.name}</span>
        </label>`).join('')}
      </div>
    </div>`).join('')}
    <div class="form-group">
      <label class="label">Fecha de inicio</label>
      <input type="date" id="ed-start" class="input" value="${s.start_date||s.created_at?.split('T')[0]||''}">
    </div>
    <div class="form-group">
      <label class="label">Método de pago</label>
      <select id="ed-method" class="input select">
        <option value="cash" ${(s.payment_method||'cash')==='cash'?'selected':''}>Efectivo</option>
        <option value="transfer" ${s.payment_method==='transfer'?'selected':''}>Transferencia</option>
        <option value="card" ${s.payment_method==='card'?'selected':''}>Tarjeta</option>
        <option value="stripe" ${s.payment_method==='stripe'?'selected':''}>Stripe</option>
      </select>
    </div>
    <div class="form-group">
      <label class="label">Dirección</label>
      <input type="text" id="ed-addr" class="input" value="${s.address||''}">
    </div>
    <div class="form-group">
      <label class="label">Condiciones especiales</label>
      <textarea id="ed-conditions" class="input" rows="3" placeholder="Lesiones recientes, enfermedades, limitaciones físicas que el instructor deba considerar…" style="resize:vertical">${s.conditions||''}</textarea>
    </div>
    <button class="btn btn-primary btn-block" onclick="saveStudent('${s.id}')">Guardar cambios</button>
    <hr style="margin:var(--space-5) 0;border:none;border-top:1px solid var(--color-border)">
    <button class="btn ${s.is_active?'btn-outline-danger':'btn-success'} btn-block" onclick="toggleStudent('${s.id}',${!s.is_active});closePanel('edit-panel')">${s.is_active?'Desactivar estudiante':'Activar estudiante'}</button>
  `;
  document.getElementById('edit-backdrop').classList.add('open');
  document.getElementById('edit-panel').classList.add('open');
}

function saveStudent(userId) {
  const s = DB.getUser(userId);
  if (!s) return;
  s.first_name = document.getElementById('ed-first').value.trim() || s.first_name;
  s.last_name  = document.getElementById('ed-last').value.trim()  || s.last_name;
  s.email      = document.getElementById('ed-email').value.trim() || s.email;
  s.phone      = document.getElementById('ed-phone').value.trim();
  s.date_of_birth = document.getElementById('ed-dob').value;
  s.start_date    = document.getElementById('ed-start').value;
  s.address       = document.getElementById('ed-addr').value.trim();
  s.payment_method = document.getElementById('ed-method').value;
  s.plan_id = document.getElementById('ed-plan').value || null;
  s.groups = MOCK_DB.axes.map(ax => document.querySelector(`input[name="ed-grp-${ax.id}"]:checked`)?.value).filter(Boolean);
  s.conditions = document.getElementById('ed-conditions').value.trim() || null;
  closePanel('edit-panel');
  Utils.toast('Estudiante actualizado', `${s.first_name} ${s.last_name} fue actualizado correctamente.`, 'success');
  renderPage();
}

function openPayModal(userId) {
  const s = DB.getUser(userId);
  const debt = DB.getStudentDebt(userId);
  document.getElementById('pay-modal-title').textContent = `Registrar pago — ${s.first_name} ${s.last_name}`;
  document.getElementById('pay-modal-body').innerHTML = `
    ${debt > 0
      ? `<div class="alert alert-warning" style="margin-bottom:var(--space-4)"><span class="alert-icon">⚠️</span><div>Deuda pendiente: <strong>${Utils.formatCurrency(debt)}</strong></div></div>`
      : `<div class="alert alert-primary" style="margin-bottom:var(--space-4)"><span class="alert-icon">💡</span><div>El estudiante está al corriente. Este pago se registrará como <strong>adelanto</strong>.</div></div>`}
    <div class="form-group">
      <label class="label">Concepto</label>
      <input type="text" id="pm-desc" class="input" value="${debt > 0 ? 'Pago mensualidad' : 'Pago adelantado'}" />
    </div>
    <div class="form-group">
      <label class="label">Monto</label>
      <input type="number" id="pm-amount" class="input" value="${debt > 0 ? debt : ''}" placeholder="0.00" min="1">
    </div>
    <div class="form-group">
      <label class="label">Método de pago</label>
      <select id="pm-method" class="input select">
        <option value="cash">Efectivo</option>
        <option value="transfer">Transferencia</option>
        <option value="card">Tarjeta</option>
      </select>
    </div>
    <div style="display:flex;gap:var(--space-3);margin-top:var(--space-5)">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('pay-modal')">Cancelar</button>
      <button class="btn btn-primary" style="flex:1" onclick="processManualPayment('${userId}')">Registrar pago</button>
    </div>
  `;
  document.getElementById('pay-modal').classList.add('open');
}

function processManualPayment(userId) {
  const s = DB.getUser(userId);
  const amount = parseFloat(document.getElementById('pm-amount').value);
  const desc = document.getElementById('pm-desc').value;
  const method = document.getElementById('pm-method').value;
  if (!amount || amount <= 0) { Utils.toast('Error','Monto inválido','error'); return; }
  const pendingTxns = MOCK_DB.transactions.filter(t => t.student_id === userId && t.status === 'pending');
  let remaining = amount;
  for (const t of pendingTxns) {
    if (remaining <= 0) break;
    if (remaining >= t.amount) { t.status = 'succeeded'; remaining -= t.amount; }
  }
  DB.addTransaction({ student_id: userId, type:'income', category:'enrollment', description: desc, amount, status:'succeeded', payment_method: method, created_at: new Date().toISOString() });
  closeModal('pay-modal');
  Utils.toast('Pago registrado', `${Utils.formatCurrency(amount)} registrado para ${s.first_name}`, 'success');
  renderPage();
}

function toggleStudent(userId, active) {
  const s = DB.getUser(userId);
  if (!s) return;
  if (!active && !confirm(`¿Desactivar a ${s.first_name} ${s.last_name}? El estudiante no podrá acceder a la plataforma.`)) return;
  s.is_active = active;
  Utils.toast(active ? 'Estudiante activado' : 'Estudiante desactivado', `${s.first_name} ${s.last_name} ha sido ${active?'activado':'desactivado'}`, active?'success':'warning');
  renderPage();
}

renderPage();
</script>
</body>
</html>
