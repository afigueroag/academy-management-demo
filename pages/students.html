<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alumnos — Academia</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<script src="../js/mock-data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
Auth.requireRole(['admin','receptionist']);
Utils.renderAppLayout('Alumnos', 'students');

const user = Auth.getCurrentUser();

const state = {
  search: '',
  filterStatus: 'active',
  filterCategory: '',
  filterDebt: '',
  selectedStudent: null
};

function getStudents() {
  return MOCK_DB.users.filter(u => u.role === 'student');
}

function filteredStudents() {
  let list = getStudents();
  if (state.filterStatus === 'active') list = list.filter(u => u.is_active);
  else if (state.filterStatus === 'inactive') list = list.filter(u => !u.is_active);
  if (state.filterCategory) list = list.filter(u => u.categories.includes(state.filterCategory));
  if (state.filterDebt === 'yes') list = list.filter(u => DB.getStudentDebt(u.id) > 0);
  else if (state.filterDebt === 'no') list = list.filter(u => DB.getStudentDebt(u.id) === 0);
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(u =>
      u.first_name.toLowerCase().includes(q) ||
      u.last_name.toLowerCase().includes(q) ||
      u.email.toLowerCase().includes(q) ||
      (u.phone && u.phone.includes(q))
    );
  }
  return list;
}

function getAvgAttendance() {
  const students = getStudents().filter(u => u.is_active);
  if (!students.length) return 0;
  const rates = students.map(u => DB.getAttendanceRate(u.id));
  return Math.round(rates.reduce((a,b) => a+b, 0) / rates.length);
}

function getNewThisMonth() {
  const now = new Date();
  return getStudents().filter(u => {
    const d = new Date(u.created_at);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  }).length;
}

function renderPage() {
  const main = document.getElementById('app-main');
  const students = getStudents();
  const active = students.filter(u => u.is_active).length;
  const withDebt = students.filter(u => DB.getStudentDebt(u.id) > 0).length;
  const newMonth = getNewThisMonth();
  const avgAtt = getAvgAttendance();

  main.innerHTML = `
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-6)">
      <div>
        <h1 class="page-title">Alumnos</h1>
        <p style="color:var(--color-text-muted);margin-top:var(--space-1)">Gestión de estudiantes inscritos</p>
      </div>
      <div style="display:flex;gap:var(--space-3)">
        <button class="btn btn-outline" onclick="openInvitePanel()">Invitar alumno</button>
        <button class="btn btn-primary" onclick="openCreatePanel()">+ Crear alumno</button>
      </div>
    </div>

    <div class="scorecard-grid" style="margin-bottom:var(--space-6)">
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Activos</span><span style="font-size:1.5rem">👥</span></div>
        <div class="scorecard-value">${active}</div>
        <div class="scorecard-trend trend-up">de ${students.length} totales</div>
      </div>
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Nuevos este mes</span><span style="font-size:1.5rem">✨</span></div>
        <div class="scorecard-value">${newMonth}</div>
        <div class="scorecard-trend trend-up">inscritos en mayo</div>
      </div>
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Con deuda</span><span style="font-size:1.5rem">⚠️</span></div>
        <div class="scorecard-value">${withDebt}</div>
        <div class="scorecard-trend trend-down">${withDebt > 0 ? 'requieren atención' : 'todo al corriente'}</div>
      </div>
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Asistencia promedio</span><span style="font-size:1.5rem">📊</span></div>
        <div class="scorecard-value">${avgAtt}%</div>
        <div class="scorecard-trend ${avgAtt >= 75 ? 'trend-up' : 'trend-down'}">últimas 4 semanas</div>
      </div>
    </div>

    <div class="card" style="padding:var(--space-5)">
      <div style="display:flex;flex-wrap:wrap;gap:var(--space-3);margin-bottom:var(--space-4);align-items:center">
        <div class="search-input" style="flex:1;min-width:200px">
          <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
          <input type="text" class="search-field" placeholder="Buscar por nombre, email o teléfono…" oninput="state.search=this.value;renderTable()" value="${state.search}">
        </div>
        <select class="input select" style="width:auto" onchange="state.filterStatus=this.value;renderTable()">
          <option value="active" ${state.filterStatus==='active'?'selected':''}>Activos</option>
          <option value="inactive" ${state.filterStatus==='inactive'?'selected':''}>Inactivos</option>
          <option value="all" ${state.filterStatus==='all'?'selected':''}>Todos</option>
        </select>
        <select class="input select" style="width:auto" onchange="state.filterCategory=this.value;renderTable()">
          <option value="">Todas las categorías</option>
          ${MOCK_DB.categories.map(c => `<option value="${c.id}" ${state.filterCategory===c.id?'selected':''}>${c.name}</option>`).join('')}
        </select>
        <select class="input select" style="width:auto" onchange="state.filterDebt=this.value;renderTable()">
          <option value="">Cualquier deuda</option>
          <option value="yes" ${state.filterDebt==='yes'?'selected':''}>Con deuda</option>
          <option value="no" ${state.filterDebt==='no'?'selected':''}>Sin deuda</option>
        </select>
      </div>
      <div id="students-table-wrap"></div>
    </div>

    <!-- Panel: Invitar -->
    <div class="side-panel-backdrop" id="invite-backdrop" onclick="closePanel('invite-panel')"></div>
    <div class="side-panel" id="invite-panel">
      <div class="side-panel-header">
        <h3>Invitar alumno</h3>
        <button class="btn btn-ghost btn-icon" onclick="closePanel('invite-panel')">✕</button>
      </div>
      <div style="padding:var(--space-5)">
        <p style="color:var(--color-text-muted);margin-bottom:var(--space-5)">Se enviará un correo de invitación con un enlace para completar el registro.</p>
        <div class="form-group">
          <label class="label">Nombre</label>
          <input type="text" id="inv-name" class="input" placeholder="Nombre completo">
        </div>
        <div class="form-group">
          <label class="label">Correo electrónico</label>
          <input type="email" id="inv-email" class="input" placeholder="alumno@ejemplo.com">
        </div>
        <div class="form-group">
          <label class="label">Categoría de suscripción</label>
          <select id="inv-cat" class="input select">
            <option value="">Sin asignar</option>
            ${MOCK_DB.categories.map(c => `<option value="${c.id}">${c.name} — ${Utils.formatCurrency(c.monthly_fee)}/mes</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="label">Mensaje personalizado (opcional)</label>
          <textarea id="inv-msg" class="input" rows="3" placeholder="Hola, te invitamos a unirte a nuestra academia…"></textarea>
        </div>
        <button class="btn btn-primary btn-block" onclick="sendInvite()">Enviar invitación</button>
      </div>
    </div>

    <!-- Panel: Crear alumno -->
    <div class="side-panel-backdrop" id="create-backdrop" onclick="closePanel('create-panel')"></div>
    <div class="side-panel" id="create-panel">
      <div class="side-panel-header">
        <h3>Crear alumno</h3>
        <button class="btn btn-ghost btn-icon" onclick="closePanel('create-panel')">✕</button>
      </div>
      <div style="padding:var(--space-5)">
        <div class="form-row">
          <div class="form-group">
            <label class="label">Nombre</label>
            <input type="text" id="cr-first" class="input" placeholder="Nombre">
          </div>
          <div class="form-group">
            <label class="label">Apellido</label>
            <input type="text" id="cr-last" class="input" placeholder="Apellido">
          </div>
        </div>
        <div class="form-group">
          <label class="label">Correo electrónico</label>
          <input type="email" id="cr-email" class="input" placeholder="alumno@ejemplo.com">
        </div>
        <div class="form-group">
          <label class="label">Teléfono</label>
          <input type="tel" id="cr-phone" class="input" placeholder="+52 55 0000 0000">
        </div>
        <div class="form-group">
          <label class="label">Fecha de nacimiento</label>
          <input type="date" id="cr-dob" class="input">
        </div>
        <div class="form-group">
          <label class="label">Categoría de suscripción</label>
          <select id="cr-cat" class="input select">
            <option value="">Sin asignar</option>
            ${MOCK_DB.categories.map(c => `<option value="${c.id}">${c.name} — ${Utils.formatCurrency(c.monthly_fee)}/mes</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="label">Dirección</label>
          <input type="text" id="cr-addr" class="input" placeholder="Colonia, Ciudad">
        </div>
        <button class="btn btn-primary btn-block" onclick="createStudent()">Crear alumno</button>
      </div>
    </div>

    <!-- Panel: Ver/editar alumno -->
    <div class="side-panel-backdrop" id="view-backdrop" onclick="closePanel('view-panel')"></div>
    <div class="side-panel" id="view-panel" style="width:480px">
      <div class="side-panel-header">
        <h3 id="view-panel-title">Alumno</h3>
        <button class="btn btn-ghost btn-icon" onclick="closePanel('view-panel')">✕</button>
      </div>
      <div id="view-panel-body" style="padding:var(--space-5)"></div>
    </div>

    <!-- Modal: Registrar pago -->
    <div class="modal-backdrop" id="pay-modal-backdrop" onclick="closeModal('pay-modal')" style="display:none"></div>
    <div class="modal" id="pay-modal" style="display:none;max-width:440px">
      <div class="modal-header">
        <h3 id="pay-modal-title">Registrar pago</h3>
        <button class="btn btn-ghost btn-icon" onclick="closeModal('pay-modal')">✕</button>
      </div>
      <div id="pay-modal-body" style="padding:var(--space-5)"></div>
    </div>
  `;

  renderTable();
}

function renderTable() {
  const list = filteredStudents();
  const wrap = document.getElementById('students-table-wrap');
  if (!wrap) return;
  if (!list.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Sin resultados</div><div class="empty-desc">No hay alumnos que coincidan con los filtros aplicados.</div></div>`;
    return;
  }
  wrap.innerHTML = `
    <div class="table-responsive">
      <table class="table">
        <thead><tr>
          <th>Alumno</th>
          <th>Categorías</th>
          <th>Clases</th>
          <th>Deuda</th>
          <th>Asistencia</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr></thead>
        <tbody>
          ${list.map(s => {
            const debt = DB.getStudentDebt(s.id);
            const att = DB.getAttendanceRate(s.id);
            const enrolls = DB.getEnrollmentsForStudent(s.id).filter(e => e.status === 'active').length;
            return `<tr>
              <td>
                <div style="display:flex;align-items:center;gap:var(--space-3)">
                  ${Utils.avatarHtml(s, 36)}
                  <div>
                    <div style="font-weight:500">${s.first_name} ${s.last_name}</div>
                    <div style="font-size:var(--text-xs);color:var(--color-text-muted)">${s.email}</div>
                  </div>
                </div>
              </td>
              <td>${s.categories.length ? s.categories.map(c => Utils.categoryChip(c)).join('') : '<span style="color:var(--color-text-muted);font-size:var(--text-xs)">Sin categoría</span>'}</td>
              <td><span style="font-weight:500">${enrolls}</span> activas</td>
              <td>${debt > 0 ? `<span style="color:var(--color-danger);font-weight:600">${Utils.formatCurrency(debt)}</span>` : '<span style="color:var(--color-success)">—</span>'}</td>
              <td>
                <div style="display:flex;align-items:center;gap:var(--space-2)">
                  <div style="width:60px;height:6px;background:var(--color-border);border-radius:3px;overflow:hidden">
                    <div style="width:${att}%;height:100%;background:${att>=75?'var(--color-success)':att>=50?'var(--color-warning)':'var(--color-danger)'}"></div>
                  </div>
                  <span style="font-size:var(--text-xs)">${att}%</span>
                </div>
              </td>
              <td><span class="badge ${s.is_active?'badge-success':'badge-default'}">${s.is_active?'Activo':'Inactivo'}</span></td>
              <td>
                <div style="display:flex;gap:var(--space-2)">
                  <button class="btn btn-ghost btn-icon" title="Ver detalle" onclick="openViewPanel('${s.id}')">👁</button>
                  ${debt > 0 ? `<button class="btn btn-ghost btn-icon" title="Registrar pago" onclick="openPayModal('${s.id}')">💳</button>` : ''}
                  ${s.is_active
                    ? `<button class="btn btn-ghost btn-icon" title="Desactivar" onclick="toggleStudent('${s.id}',false)" style="color:var(--color-danger)">🚫</button>`
                    : `<button class="btn btn-ghost btn-icon" title="Activar" onclick="toggleStudent('${s.id}',true)" style="color:var(--color-success)">✓</button>`}
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div style="color:var(--color-text-muted);font-size:var(--text-sm);padding:var(--space-3) 0">${list.length} alumno${list.length!==1?'s':''} encontrado${list.length!==1?'s':''}</div>
  `;
}

function openInvitePanel() {
  document.getElementById('invite-backdrop').classList.add('open');
  document.getElementById('invite-panel').classList.add('open');
}
function openCreatePanel() {
  document.getElementById('create-backdrop').classList.add('open');
  document.getElementById('create-panel').classList.add('open');
}

function closePanel(id) {
  document.getElementById(id).classList.remove('open');
  const bd = id.replace('-panel','-backdrop');
  const el = document.getElementById(bd);
  if (el) el.classList.remove('open');
}
function closeModal(id) {
  document.getElementById(id).style.display = 'none';
  document.getElementById(id+'-backdrop').style.display = 'none';
}

function sendInvite() {
  const name = document.getElementById('inv-name').value.trim();
  const email = document.getElementById('inv-email').value.trim();
  if (!name || !email) { Utils.toast('Campos requeridos','Completa nombre y correo','error'); return; }
  const token = 'inv_' + Math.random().toString(36).substr(2,10);
  MOCK_DB.invitations.push({ id:'inv_new_'+Date.now(), academy_id:'acad_001', email, role:'student', token, invited_by:'user_001', created_at:new Date().toISOString(), accepted_at:null });
  closePanel('invite-panel');
  const invUrl = window.location.origin + window.location.pathname.replace('students.html','accept-invitation.html') + '?token=' + token;
  Utils.showEmailPreview(email, 'Te invitamos a unirte a Academia Arte y Movimiento',
    `<p>Hola <strong>${name}</strong>,</p>
    <p>Has sido invitado a unirte a <strong>Academia Arte y Movimiento</strong> como alumno.</p>
    <p>Haz clic en el botón de abajo para completar tu registro:</p>
    <p><a href="${invUrl}" style="background:#6366f1;color:white;padding:10px 20px;border-radius:6px;text-decoration:none;display:inline-block">Aceptar invitación</a></p>
    <p style="color:#888;font-size:12px">Este enlace expira en 72 horas.</p>`
  );
}

function createStudent() {
  const first = document.getElementById('cr-first').value.trim();
  const last = document.getElementById('cr-last').value.trim();
  const email = document.getElementById('cr-email').value.trim();
  if (!first || !last || !email) { Utils.toast('Campos requeridos','Completa nombre, apellido y correo','error'); return; }
  const catId = document.getElementById('cr-cat').value;
  const newUser = {
    id: 'user_' + (MOCK_DB.users.length + 1).toString().padStart(3,'0'),
    email, first_name: first, last_name: last,
    role: 'student',
    phone: document.getElementById('cr-phone').value,
    address: document.getElementById('cr-addr').value,
    date_of_birth: document.getElementById('cr-dob').value,
    is_active: true, hourly_rate: null, payroll_type: null,
    email_verified_at: new Date().toISOString(),
    created_at: new Date().toISOString(),
    categories: catId ? [catId] : []
  };
  MOCK_DB.users.push(newUser);
  closePanel('create-panel');
  Utils.toast('Alumno creado', `${first} ${last} ha sido registrado`, 'success');
  renderPage();
}

function openViewPanel(userId) {
  const s = DB.getUser(userId);
  if (!s) return;
  state.selectedStudent = userId;
  document.getElementById('view-panel-title').textContent = `${s.first_name} ${s.last_name}`;
  const debt = DB.getStudentDebt(s.id);
  const att = DB.getAttendanceRate(s.id);
  const enrolls = DB.getEnrollmentsForStudent(s.id).filter(e => e.status==='active');
  const txns = MOCK_DB.transactions.filter(t => t.student_id === s.id).slice(0,5);
  document.getElementById('view-panel-body').innerHTML = `
    <div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-5)">
      ${Utils.avatarHtml(s, 56)}
      <div>
        <div style="font-weight:600;font-size:var(--text-lg)">${s.first_name} ${s.last_name}</div>
        <div style="color:var(--color-text-muted);font-size:var(--text-sm)">${s.email}</div>
        <div style="margin-top:var(--space-2)">${s.categories.map(c=>Utils.categoryChip(c)).join('') || '<span style="color:var(--color-text-muted);font-size:var(--text-xs)">Sin categoría</span>'}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);margin-bottom:var(--space-5)">
      <div style="background:var(--color-bg);padding:var(--space-3);border-radius:var(--radius-md)">
        <div style="font-size:var(--text-xs);color:var(--color-text-muted)">Deuda pendiente</div>
        <div style="font-size:var(--text-xl);font-weight:700;color:${debt>0?'var(--color-danger)':'var(--color-success)'}">${debt>0?Utils.formatCurrency(debt):'Sin deuda'}</div>
      </div>
      <div style="background:var(--color-bg);padding:var(--space-3);border-radius:var(--radius-md)">
        <div style="font-size:var(--text-xs);color:var(--color-text-muted)">Asistencia</div>
        <div style="font-size:var(--text-xl);font-weight:700">${att}%</div>
      </div>
    </div>
    <div style="margin-bottom:var(--space-4)">
      <div style="font-weight:600;margin-bottom:var(--space-3)">Clases inscritas (${enrolls.length})</div>
      ${enrolls.length ? enrolls.map(e => {
        const cls = DB.getClass(e.class_id);
        return cls ? `<div style="display:flex;align-items:center;justify-content:space-between;padding:var(--space-2) 0;border-bottom:1px solid var(--color-border)"><span>${cls.name}</span><span style="font-size:var(--text-xs);color:var(--color-text-muted)">${Utils.dayLabel(cls.schedule_day)} ${cls.schedule_time}</span></div>` : '';
      }).join('') : '<p style="color:var(--color-text-muted);font-size:var(--text-sm)">Sin inscripciones activas</p>'}
    </div>
    <div style="margin-bottom:var(--space-5)">
      <div style="font-weight:600;margin-bottom:var(--space-3)">Últimas transacciones</div>
      ${txns.length ? txns.map(t => `
        <div style="display:flex;justify-content:space-between;padding:var(--space-2) 0;border-bottom:1px solid var(--color-border)">
          <span style="font-size:var(--text-sm)">${t.description}</span>
          <span style="font-weight:600;color:${t.status==='succeeded'?'var(--color-success)':'var(--color-warning)'}">${Utils.formatCurrency(t.amount)}</span>
        </div>
      `).join('') : '<p style="color:var(--color-text-muted);font-size:var(--text-sm)">Sin transacciones</p>'}
    </div>
    <div style="display:flex;flex-direction:column;gap:var(--space-3)">
      ${debt > 0 ? `<button class="btn btn-primary" onclick="openPayModal('${s.id}');closePanel('view-panel')">Registrar pago — ${Utils.formatCurrency(debt)}</button>` : ''}
      <button class="btn btn-outline" onclick="openCatModal('${s.id}')">Cambiar categoría</button>
      <button class="btn ${s.is_active?'btn-danger':'btn-success'}" onclick="toggleStudent('${s.id}',${!s.is_active});closePanel('view-panel')">${s.is_active?'Desactivar alumno':'Activar alumno'}</button>
    </div>
  `;
  document.getElementById('view-backdrop').classList.add('open');
  document.getElementById('view-panel').classList.add('open');
}

function openPayModal(userId) {
  const s = DB.getUser(userId);
  const debt = DB.getStudentDebt(userId);
  document.getElementById('pay-modal-title').textContent = `Registrar pago — ${s.first_name} ${s.last_name}`;
  document.getElementById('pay-modal-body').innerHTML = `
    <p style="color:var(--color-text-muted);margin-bottom:var(--space-4)">Deuda pendiente: <strong style="color:var(--color-danger)">${Utils.formatCurrency(debt)}</strong></p>
    <div class="form-group">
      <label class="label">Concepto</label>
      <input type="text" id="pm-desc" class="input" value="Pago mensualidad" />
    </div>
    <div class="form-group">
      <label class="label">Monto</label>
      <input type="number" id="pm-amount" class="input" value="${debt}" min="1">
    </div>
    <div class="form-group">
      <label class="label">Método de pago</label>
      <select id="pm-method" class="input select">
        <option value="cash">Efectivo</option>
        <option value="transfer">Transferencia</option>
        <option value="card">Tarjeta</option>
      </select>
    </div>
    <div style="display:flex;gap:var(--space-3);margin-top:var(--space-5)">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('pay-modal')">Cancelar</button>
      <button class="btn btn-primary" style="flex:1" onclick="processManualPayment('${userId}')">Registrar pago</button>
    </div>
  `;
  document.getElementById('pay-modal-backdrop').style.display = 'block';
  document.getElementById('pay-modal').style.display = 'flex';
}

function processManualPayment(userId) {
  const s = DB.getUser(userId);
  const amount = parseFloat(document.getElementById('pm-amount').value);
  const desc = document.getElementById('pm-desc').value;
  const method = document.getElementById('pm-method').value;
  if (!amount || amount <= 0) { Utils.toast('Error','Monto inválido','error'); return; }
  const pendingTxns = MOCK_DB.transactions.filter(t => t.student_id === userId && t.status === 'pending');
  let remaining = amount;
  for (const t of pendingTxns) {
    if (remaining <= 0) break;
    if (remaining >= t.amount) { t.status = 'succeeded'; remaining -= t.amount; }
  }
  DB.addTransaction({ student_id: userId, type:'income', category:'enrollment', description: desc, amount, status:'succeeded', payment_method: method, created_at: new Date().toISOString() });
  closeModal('pay-modal');
  Utils.toast('Pago registrado', `${Utils.formatCurrency(amount)} registrado para ${s.first_name}`, 'success');
  renderPage();
}

function openCatModal(userId) {
  const s = DB.getUser(userId);
  document.getElementById('pay-modal-title').textContent = `Categoría — ${s.first_name} ${s.last_name}`;
  document.getElementById('pay-modal-body').innerHTML = `
    <p style="color:var(--color-text-muted);margin-bottom:var(--space-4)">Selecciona la categoría de suscripción del alumno.</p>
    <div class="form-group">
      <label class="label">Categoría</label>
      <select id="cat-select" class="input select">
        <option value="">Sin categoría</option>
        ${MOCK_DB.categories.map(c => `<option value="${c.id}" ${s.categories.includes(c.id)?'selected':''}>${c.name} — ${Utils.formatCurrency(c.monthly_fee)}/mes</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:var(--space-3);margin-top:var(--space-5)">
      <button class="btn btn-outline" style="flex:1" onclick="closeModal('pay-modal')">Cancelar</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveCategory('${userId}')">Guardar</button>
    </div>
  `;
  closePanel('view-panel');
  document.getElementById('pay-modal-backdrop').style.display = 'block';
  document.getElementById('pay-modal').style.display = 'flex';
}

function saveCategory(userId) {
  const s = DB.getUser(userId);
  const catId = document.getElementById('cat-select').value;
  s.categories = catId ? [catId] : [];
  closeModal('pay-modal');
  Utils.toast('Categoría actualizada', `Categoría de ${s.first_name} actualizada`, 'success');
  renderPage();
}

function toggleStudent(userId, active) {
  const s = DB.getUser(userId);
  if (!s) return;
  if (!active && !confirm(`¿Desactivar a ${s.first_name} ${s.last_name}? El alumno no podrá acceder a la plataforma.`)) return;
  s.is_active = active;
  Utils.toast(active ? 'Alumno activado' : 'Alumno desactivado', `${s.first_name} ${s.last_name} ha sido ${active?'activado':'desactivado'}`, active?'success':'warning');
  renderPage();
}

renderPage();
</script>
</body>
</html>
