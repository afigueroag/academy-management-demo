<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastos — Dashboard</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<script src="../js/mock-data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
Auth.requireRole(['admin']);
Utils.renderAppLayout('Dashboard', 'dashboard');

const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

const EXPENSE_CATEGORIES = {
  rent: { label:'Renta', color:'#ef4444' },
  utilities: { label:'Servicios', color:'#f97316' },
  supplies: { label:'Materiales', color:'#eab308' },
  marketing: { label:'Marketing', color:'#22c55e' },
  maintenance: { label:'Mantenimiento', color:'#06b6d4' },
  other: { label:'Otros', color:'#8b5cf6' }
};

function getExpensesByCategory() {
  const result = {};
  Object.keys(EXPENSE_CATEGORIES).forEach(k => { result[k] = 0; });
  MOCK_DB.transactions
    .filter(t => t.type === 'expense' && t.status === 'succeeded')
    .forEach(t => {
      const cat = t.category in result ? t.category : 'other';
      result[cat] += t.amount;
    });
  return result;
}

function getMonthlyExpenses() {
  const now = new Date();
  return Array.from({length:6}, (_, i) => {
    const target = new Date(now.getFullYear(), now.getMonth() - (5-i), 1);
    const txns = MOCK_DB.transactions.filter(t => {
      const d = new Date(t.created_at);
      return t.type==='expense' && t.status==='succeeded' &&
        d.getMonth()===target.getMonth() && d.getFullYear()===target.getFullYear();
    });
    const catData = {};
    Object.keys(EXPENSE_CATEGORIES).forEach(k => { catData[k] = 0; });
    txns.forEach(t => {
      const cat = t.category in catData ? t.category : 'other';
      catData[cat] += t.amount;
    });
    return { label: MONTHS[target.getMonth()], total: txns.reduce((s,t)=>s+t.amount,0), ...catData };
  });
}

function renderPage() {
  const main = document.getElementById('app-main');
  const expenseTxns = MOCK_DB.transactions.filter(t => t.type==='expense' && t.status==='succeeded');
  const totalExpenses = expenseTxns.reduce((s,t) => s+t.amount, 0);
  const now = new Date();
  const monthExpenses = expenseTxns.filter(t => {
    const d = new Date(t.created_at);
    return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
  }).reduce((s,t) => s+t.amount, 0);
  const expByCat = getExpensesByCategory();
  const monthly = getMonthlyExpenses();
  const recentExpenses = MOCK_DB.transactions.filter(t => t.type==='expense').sort((a,b) => new Date(b.created_at)-new Date(a.created_at)).slice(0,8);

  main.innerHTML = `
    <div style="margin-bottom:var(--space-6)">
      <h1 class="page-title" style="margin-bottom:var(--space-4)">Dashboard financiero</h1>
      <div style="display:flex;gap:var(--space-1);border-bottom:2px solid var(--color-border);margin-bottom:var(--space-6)">
        <a href="dashboard.html" class="tab">Resumen</a>
        <a href="dashboard-revenue.html" class="tab">Ingresos</a>
        <a href="dashboard-expenses.html" class="tab tab-active">Gastos</a>
        <a href="dashboard-pl.html" class="tab">P&L</a>
        <a href="dashboard-payroll.html" class="tab">Nómina</a>
      </div>
    </div>

    <div class="scorecard-grid" style="margin-bottom:var(--space-6)">
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Total gastos</span><span style="font-size:1.5rem">📋</span></div>
        <div class="scorecard-value">${Utils.formatCurrency(totalExpenses)}</div>
        <div class="scorecard-trend trend-down">gastos acumulados</div>
      </div>
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Este mes</span><span style="font-size:1.5rem">📅</span></div>
        <div class="scorecard-value">${Utils.formatCurrency(monthExpenses)}</div>
        <div class="scorecard-trend trend-down">gastos de mayo</div>
      </div>
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Mayor categoría</span><span style="font-size:1.5rem">📊</span></div>
        <div class="scorecard-value" style="font-size:var(--text-xl)">${EXPENSE_CATEGORIES[Object.keys(expByCat).reduce((a,b) => expByCat[a]>expByCat[b]?a:b)]?.label || '—'}</div>
        <div class="scorecard-trend trend-down">mayor gasto</div>
      </div>
      <div class="scorecard">
        <div class="scorecard-top"><span class="scorecard-label">Promedio mensual</span><span style="font-size:1.5rem">📈</span></div>
        <div class="scorecard-value">${Utils.formatCurrency(Math.round(monthly.reduce((s,m)=>s+m.total,0)/6))}</div>
        <div class="scorecard-trend trend-down">últimos 6 meses</div>
      </div>
    </div>

    <div class="content-cols" style="margin-bottom:var(--space-6)">
      <div class="card" style="padding:var(--space-5)">
        <h3 style="margin-bottom:var(--space-4)">Gastos mensuales por categoría</h3>
        <div style="position:relative;height:280px">
          <canvas id="monthly-exp-chart"></canvas>
        </div>
      </div>
      <div class="card" style="padding:var(--space-5)">
        <h3 style="margin-bottom:var(--space-4)">Distribución por categoría</h3>
        <div style="position:relative;height:220px">
          <canvas id="cat-pie"></canvas>
        </div>
        <div style="margin-top:var(--space-4)">
          ${Object.entries(EXPENSE_CATEGORIES).filter(([k]) => expByCat[k]>0).map(([k,v]) => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:var(--space-2) 0;border-bottom:1px solid var(--color-border)">
              <span style="display:flex;align-items:center;gap:var(--space-2)">
                <span style="width:10px;height:10px;border-radius:50%;background:${v.color};display:inline-block"></span>
                ${v.label}
              </span>
              <div style="text-align:right">
                <div style="font-weight:600">${Utils.formatCurrency(expByCat[k])}</div>
                <div style="font-size:var(--text-xs);color:var(--color-text-muted)">${totalExpenses>0?Math.round(expByCat[k]/totalExpenses*100):0}%</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="card" style="padding:var(--space-5)">
      <h3 style="margin-bottom:var(--space-4)">Últimos gastos registrados</h3>
      ${recentExpenses.length ? `
      <div class="table-responsive">
        <table class="table">
          <thead><tr><th>Fecha</th><th>Concepto</th><th>Categoría</th><th>Monto</th><th>Estado</th></tr></thead>
          <tbody>
            ${recentExpenses.map(t => {
              const cat = EXPENSE_CATEGORIES[t.category] || EXPENSE_CATEGORIES['other'];
              return `<tr>
                <td style="color:var(--color-text-muted);font-size:var(--text-sm)">${Utils.formatDate(t.created_at)}</td>
                <td style="font-size:var(--text-sm)">${t.description}</td>
                <td><span style="font-size:var(--text-xs);padding:2px 8px;border-radius:9999px;background:${cat.color}22;color:${cat.color}">${cat.label}</span></td>
                <td style="font-weight:600">${Utils.formatCurrency(t.amount)}</td>
                <td><span class="badge ${t.status==='succeeded'?'badge-success':t.status==='pending'?'badge-warning':'badge-default'}">${t.status==='succeeded'?'Pagado':'Pendiente'}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>` : `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">Sin gastos registrados</div></div>`}
    </div>
  `;

  const filteredCats = Object.entries(EXPENSE_CATEGORIES).filter(([k]) => expByCat[k]>0);

  // Stacked bar
  const ctx1 = document.getElementById('monthly-exp-chart').getContext('2d');
  new Chart(ctx1, {
    type: 'bar',
    data: {
      labels: monthly.map(m => m.label),
      datasets: Object.entries(EXPENSE_CATEGORIES).map(([k,v]) => ({
        label: v.label,
        data: monthly.map(m => m[k]||0),
        backgroundColor: v.color + 'cc',
        borderRadius: 2
      }))
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'bottom' } },
      scales:{ x:{ stacked:true }, y:{ stacked:true, beginAtZero:true, ticks:{ callback: v => '$'+v.toLocaleString() } } }
    }
  });

  // Pie
  const ctx2 = document.getElementById('cat-pie').getContext('2d');
  new Chart(ctx2, {
    type: 'pie',
    data: {
      labels: filteredCats.map(([k,v]) => v.label),
      datasets: [{ data: filteredCats.map(([k]) => expByCat[k]), backgroundColor: filteredCats.map(([k,v]) => v.color), borderWidth:0 }]
    },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } } }
  });
}

renderPage();
</script>
</body>
</html>
