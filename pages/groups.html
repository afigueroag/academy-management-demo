<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupos — Academia</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

<script src="../js/mock-data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/utils.js"></script>
<script>
Auth.requireRole(['admin']);
Utils.renderAppLayout('Grupos', 'groups');

/* ── State ────────────────────────────────────────────────────────── */
let editingAxisId = null;
let editingGroupId = null;
let activeAxisForGroup = null;

/* ── Helpers ──────────────────────────────────────────────────────── */
function studentsInGroup(groupId) {
  return MOCK_DB.users.filter(u => u.role === 'student' && (u.groups || []).includes(groupId));
}

function classesRequiringGroup(groupId) {
  return MOCK_DB.classes.filter(cls => cls.min_group === groupId);
}

/* ── Render ───────────────────────────────────────────────────────── */
function renderPage() {
  const axes = MOCK_DB.axes;

  document.getElementById('app-main').innerHTML = `
    <!-- Toolbar -->
    <div class="page-toolbar" style="margin-bottom:var(--space-6)">
      <div>
        <p style="margin:0;color:var(--color-text-muted);font-size:var(--font-size-sm)">
          Los ejes definen dimensiones de clasificación (p.ej. Nivel, Disciplina). Los grupos son los valores dentro de cada eje.
        </p>
      </div>
      <button class="btn btn-primary" onclick="openNewAxisModal()">+ Nuevo eje</button>
    </div>

    <!-- Axes sections -->
    ${axes.length === 0 ? `<div class="empty-state"><p>No hay ejes creados todavía.</p></div>` : ''}
    ${axes.map(axis => renderAxisSection(axis)).join('')}

    <!-- Axis modal -->
    <div class="modal-backdrop" id="axis-modal">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3 class="modal-title" id="axis-modal-title">Nuevo eje</h3>
          <button class="modal-close" onclick="Utils.closeModal('axis-modal')">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Nombre del eje</label>
            <input class="form-control" id="axis-name" placeholder="Ej. Nivel, Disciplina, Cinta…">
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:var(--space-3);cursor:pointer">
              <input type="checkbox" id="axis-ordered" style="width:16px;height:16px">
              <div>
                <div style="font-weight:500">Eje ordenado</div>
                <div style="font-size:var(--font-size-xs);color:var(--color-text-muted)">Activa si los grupos tienen jerarquía (Principiante → Avanzado). Permite restringir clases por nivel mínimo.</div>
              </div>
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="Utils.closeModal('axis-modal')">Cancelar</button>
          <button class="btn btn-primary" onclick="saveAxis()">Guardar</button>
        </div>
      </div>
    </div>

    <!-- Group modal -->
    <div class="modal-backdrop" id="group-modal">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3 class="modal-title" id="group-modal-title">Nuevo grupo</h3>
          <button class="modal-close" onclick="Utils.closeModal('group-modal')">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Nombre</label>
            <input class="form-control" id="group-name" placeholder="Ej. Principiante, Ballet…">
          </div>
          <div class="form-group" id="group-order-group">
            <label class="form-label">Orden <span style="color:var(--color-text-muted);font-weight:400">(1 = más bajo)</span></label>
            <input class="form-control" id="group-order" type="number" min="1" placeholder="1">
          </div>
          <div class="form-group">
            <label class="form-label">Color</label>
            <div style="display:flex;gap:var(--space-2);flex-wrap:wrap" id="group-color-picker">
              ${['#10b981','#06b6d4','#6366f1','#8b5cf6','#f59e0b','#ef4444','#ec4899','#14b8a6','#84cc16','#f97316'].map(c =>
                `<button type="button" class="group-color-swatch" data-color="${c}" onclick="selectGroupColor('${c}')" style="width:28px;height:28px;border-radius:50%;background:${c};border:2px solid transparent;cursor:pointer;transition:transform .15s"></button>`
              ).join('')}
            </div>
            <input type="hidden" id="group-color" value="#10b981">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="Utils.closeModal('group-modal')">Cancelar</button>
          <button class="btn btn-primary" onclick="saveGroup()">Guardar</button>
        </div>
      </div>
    </div>

    <!-- Delete confirm modal -->
    <div class="modal-backdrop" id="delete-confirm-modal">
      <div class="modal modal-sm">
        <div class="modal-header">
          <h3 class="modal-title">Eliminar</h3>
          <button class="modal-close" onclick="Utils.closeModal('delete-confirm-modal')">✕</button>
        </div>
        <div class="modal-body">
          <p id="delete-confirm-text">¿Eliminar este elemento?</p>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="Utils.closeModal('delete-confirm-modal')">Cancelar</button>
          <button class="btn btn-danger" id="delete-confirm-btn">Eliminar</button>
        </div>
      </div>
    </div>
  `;

  Utils.initModals();
}

function renderAxisSection(axis) {
  const groups = DB.getGroupsByAxis(axis.id);

  return `
    <div class="card" style="margin-bottom:var(--space-5)">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:var(--space-3)">
          <h3 style="margin:0;font-size:var(--font-size-base)">${axis.name}</h3>
          ${axis.ordered
            ? '<span class="badge badge-primary" style="font-size:11px">Ordenado</span>'
            : '<span class="badge badge-gray" style="font-size:11px">No ordenado</span>'}
          <span style="color:var(--color-text-muted);font-size:var(--font-size-sm)">${groups.length} grupos</span>
        </div>
        <div style="display:flex;gap:var(--space-2)">
          <button class="btn btn-sm btn-ghost" onclick="openEditAxisModal('${axis.id}')">Editar eje</button>
          <button class="btn btn-sm btn-ghost" style="color:var(--color-danger)" onclick="confirmDeleteAxis('${axis.id}')">Eliminar eje</button>
          <button class="btn btn-sm btn-secondary" onclick="openNewGroupModal('${axis.id}')">+ Grupo</button>
        </div>
      </div>
      <div class="card-body" style="padding-top:var(--space-3)">
        ${groups.length === 0
          ? `<p style="color:var(--color-text-muted);font-size:var(--font-size-sm);margin:0">Sin grupos. Agrega el primero.</p>`
          : `<div style="display:flex;flex-direction:column;gap:var(--space-2)">${groups.map((grp, idx) => renderGroupRow(grp, axis, idx, groups.length)).join('')}</div>`}
      </div>
    </div>
  `;
}

function renderGroupRow(grp, axis, idx, total) {
  const students = studentsInGroup(grp.id);
  const classDeps = classesRequiringGroup(grp.id);

  return `
    <div style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3);border-radius:var(--radius);border:1px solid var(--color-border);background:var(--color-gray-50)">
      ${axis.ordered ? `<div style="width:24px;height:24px;border-radius:50%;background:var(--color-gray-200);color:var(--color-text-muted);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0">${grp.order}</div>` : ''}
      <div style="width:14px;height:14px;border-radius:50%;background:${grp.color};flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <span style="font-weight:500">${grp.name}</span>
        <span style="color:var(--color-text-muted);font-size:var(--font-size-sm);margin-left:var(--space-3)">${students.length} estudiante${students.length !== 1 ? 's' : ''}</span>
        ${classDeps.length > 0 ? `<span style="color:var(--color-text-muted);font-size:var(--font-size-sm);margin-left:var(--space-2)">· requerido en ${classDeps.length} clase${classDeps.length !== 1 ? 's' : ''}</span>` : ''}
      </div>
      ${axis.ordered ? `
        <div style="display:flex;gap:4px">
          <button class="btn btn-xs btn-ghost" onclick="moveGroupOrder('${grp.id}','${axis.id}',-1)" ${idx === 0 ? 'disabled' : ''} title="Subir" style="padding:2px 6px;font-size:12px">↑</button>
          <button class="btn btn-xs btn-ghost" onclick="moveGroupOrder('${grp.id}','${axis.id}',1)" ${idx === total - 1 ? 'disabled' : ''} title="Bajar" style="padding:2px 6px;font-size:12px">↓</button>
        </div>
      ` : ''}
      <div style="display:flex;gap:var(--space-1)">
        <button class="btn btn-xs btn-ghost" onclick="openEditGroupModal('${grp.id}')">Editar</button>
        <button class="btn btn-xs btn-ghost" style="color:var(--color-danger)" onclick="confirmDeleteGroup('${grp.id}')">Eliminar</button>
      </div>
    </div>
  `;
}

/* ── Axis CRUD ────────────────────────────────────────────────────── */
function openNewAxisModal() {
  editingAxisId = null;
  document.getElementById('axis-modal-title').textContent = 'Nuevo eje';
  document.getElementById('axis-name').value = '';
  document.getElementById('axis-ordered').checked = false;
  Utils.openModal('axis-modal');
}

function openEditAxisModal(axisId) {
  editingAxisId = axisId;
  const axis = DB.getAxis(axisId);
  if (!axis) return;
  document.getElementById('axis-modal-title').textContent = 'Editar eje';
  document.getElementById('axis-name').value = axis.name;
  document.getElementById('axis-ordered').checked = axis.ordered;
  Utils.openModal('axis-modal');
}

function saveAxis() {
  const name = document.getElementById('axis-name').value.trim();
  if (!name) { Utils.toast('Campo requerido', 'El nombre del eje es obligatorio.', 'warning'); return; }
  const ordered = document.getElementById('axis-ordered').checked;

  if (editingAxisId) {
    const axis = DB.getAxis(editingAxisId);
    if (axis) { axis.name = name; axis.ordered = ordered; }
    Utils.toast('Eje actualizado', name, 'success');
  } else {
    MOCK_DB.axes.push({ id: 'axis_' + Date.now(), academy_id: 'acad_001', name, ordered, created_at: new Date().toISOString() });
    Utils.toast('Eje creado', name, 'success');
  }
  Utils.closeModal('axis-modal');
  renderPage();
}

function confirmDeleteAxis(axisId) {
  const axis = DB.getAxis(axisId);
  const groupCount = DB.getGroupsByAxis(axisId).length;
  document.getElementById('delete-confirm-text').textContent =
    `¿Eliminar el eje "${axis?.name}"? Se eliminarán también sus ${groupCount} grupo${groupCount !== 1 ? 's' : ''} y se borrará la clasificación de los estudiantes asignados.`;
  document.getElementById('delete-confirm-btn').onclick = () => {
    const groupIds = DB.getGroupsByAxis(axisId).map(g => g.id);
    MOCK_DB.groups = MOCK_DB.groups.filter(g => g.axis_id !== axisId);
    MOCK_DB.users.forEach(u => { if (u.groups) u.groups = u.groups.filter(gid => !groupIds.includes(gid)); });
    MOCK_DB.classes.forEach(cls => { if (groupIds.includes(cls.min_group)) cls.min_group = null; });
    MOCK_DB.axes = MOCK_DB.axes.filter(a => a.id !== axisId);
    Utils.closeModal('delete-confirm-modal');
    Utils.toast('Eje eliminado', axis?.name || '', 'info');
    renderPage();
  };
  Utils.openModal('delete-confirm-modal');
}

/* ── Group CRUD ───────────────────────────────────────────────────── */
function selectGroupColor(color) {
  document.getElementById('group-color').value = color;
  document.querySelectorAll('.group-color-swatch').forEach(sw => {
    sw.style.border = sw.dataset.color === color ? `2px solid ${color}` : '2px solid transparent';
    sw.style.transform = sw.dataset.color === color ? 'scale(1.2)' : 'scale(1)';
  });
}

function openNewGroupModal(axisId) {
  editingGroupId = null;
  activeAxisForGroup = axisId;
  const axis = DB.getAxis(axisId);
  document.getElementById('group-modal-title').textContent = `Nuevo grupo — ${axis?.name}`;
  document.getElementById('group-name').value = '';
  const nextOrder = (DB.getGroupsByAxis(axisId).length || 0) + 1;
  document.getElementById('group-order').value = nextOrder;
  document.getElementById('group-order-group').style.display = axis?.ordered ? '' : 'none';
  document.getElementById('group-color').value = '#10b981';
  selectGroupColor('#10b981');
  Utils.openModal('group-modal');
}

function openEditGroupModal(groupId) {
  editingGroupId = groupId;
  const grp = DB.getGroup(groupId);
  if (!grp) return;
  activeAxisForGroup = grp.axis_id;
  const axis = DB.getAxis(grp.axis_id);
  document.getElementById('group-modal-title').textContent = 'Editar grupo';
  document.getElementById('group-name').value = grp.name;
  document.getElementById('group-order').value = grp.order || 0;
  document.getElementById('group-order-group').style.display = axis?.ordered ? '' : 'none';
  document.getElementById('group-color').value = grp.color;
  selectGroupColor(grp.color);
  Utils.openModal('group-modal');
}

function saveGroup() {
  const name = document.getElementById('group-name').value.trim();
  if (!name) { Utils.toast('Campo requerido', 'El nombre es obligatorio.', 'warning'); return; }
  const order = parseInt(document.getElementById('group-order').value) || 0;
  const color = document.getElementById('group-color').value;

  if (editingGroupId) {
    const grp = DB.getGroup(editingGroupId);
    if (grp) { grp.name = name; grp.order = order; grp.color = color; }
    Utils.toast('Grupo actualizado', name, 'success');
  } else {
    MOCK_DB.groups.push({ id: 'grp_' + Date.now(), axis_id: activeAxisForGroup, academy_id: 'acad_001', name, order, color, created_at: new Date().toISOString() });
    Utils.toast('Grupo creado', name, 'success');
  }
  Utils.closeModal('group-modal');
  renderPage();
}

function confirmDeleteGroup(groupId) {
  const grp = DB.getGroup(groupId);
  const count = studentsInGroup(groupId).length;
  document.getElementById('delete-confirm-text').textContent =
    `¿Eliminar el grupo "${grp?.name}"? Se quitará de los ${count} estudiante${count !== 1 ? 's' : ''} asignados.`;
  document.getElementById('delete-confirm-btn').onclick = () => {
    MOCK_DB.users.forEach(u => { if (u.groups) u.groups = u.groups.filter(gid => gid !== groupId); });
    MOCK_DB.classes.forEach(cls => { if (cls.min_group === groupId) cls.min_group = null; });
    MOCK_DB.groups = MOCK_DB.groups.filter(g => g.id !== groupId);
    Utils.closeModal('delete-confirm-modal');
    Utils.toast('Grupo eliminado', grp?.name || '', 'info');
    renderPage();
  };
  Utils.openModal('delete-confirm-modal');
}

function moveGroupOrder(groupId, axisId, dir) {
  const groups = DB.getGroupsByAxis(axisId);
  const idx = groups.findIndex(g => g.id === groupId);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= groups.length) return;
  const tempOrder = groups[idx].order;
  groups[idx].order = groups[swapIdx].order;
  groups[swapIdx].order = tempOrder;
  renderPage();
}

renderPage();
</script>
</body>
</html>
