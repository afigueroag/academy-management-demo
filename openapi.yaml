# This is an **example** API to demonstrate features of OpenAPI specification.
# It doesn't cover all OpenAPI features. For more full example check out: https://github.com/APIs-guru/petstore_extended

openapi: 3.0.2
info:
  version: '1.0.0'
  title: Academy Management API
  description: |
    SaaS API for academy management (sports, music, arts, etc.)

    # Features
    - Multi-tenant: Each academy is isolated
    - 4 roles: Admin, Receptionist, Instructor, Student
    - OAuth2 Authorization Code flow
    - Stripe Connect for payments
    - Automated invoicing & audit logs

    # Authentication
    All endpoints (except `/auth/*` signup/login) require OAuth2 Bearer token in Authorization header:
    ```
    Authorization: Bearer {access_token}
    ```

  contact:
    email: support@academy-management.com
  license:
    name: Apache 2.0
    url: 'http://www.apache.org/licenses/LICENSE-2.0.html'
externalDocs:
  description: Find out how to create a GitHub repo for your OpenAPI definition.
  url: 'https://github.com/Rebilly/generator-openapi-repo'

tags:
  - name: Authentication
    description: Signup, login, token refresh, password reset
  - name: Users
    description: User management (filter by role for instructors, students, etc.)
  - name: Academies
    description: Academy/account settings
  - name: Categories
    description: Class categories/subscriptions (admin only)
  - name: Classes
    description: Classes management
  - name: Enrollments
    description: Class enrollments/inscriptions
  - name: Payments
    description: Payment processing with Stripe
  - name: Invoices
    description: Invoice generation and management
  - name: Attendance
    description: Attendance tracking
  - name: Dashboard
    description: Admin reports and analytics

servers:
  - url: 'http://localhost:3000/api/v1'
  - url: 'https://api.academy-management.com/api/v1'

paths:
  /auth/signup:
    post:
      tags:
        - Authentication
      summary: Admin signup (create academy account)
      description: Create new academy account with subscription. Admin receives verification email.
      operationId: adminSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, academy_name]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@myacademy.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: SecurePass123!
                academy_name:
                  type: string
                  example: My Sports Academy
                first_name:
                  type: string
                  example: John
                last_name:
                  type: string
                  example: Doe
      responses:
        '201':
          description: Account created. Verification email sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Account created. Please verify your email.
                  academy_id:
                    type: string
                    example: acad_123abc
                  email:
                    type: string
                    example: admin@myacademy.com
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify-email:
    post:
      tags:
        - Authentication
      summary: Verify email address
      description: Verify email with token sent to admin's email. Must be done before login.
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Email verified. You can now login.
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login with email and password
      description: Returns access token (30 min) and refresh token (30 days)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@myacademy.com
                password:
                  type: string
                  format: password
                  example: SecurePass123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Invalid credentials or email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Get new access token using refresh token
      description: Exchange refresh token for new access token (30 min). Refresh token remains valid.
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 1800
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout (invalidate refresh token)
      description: Invalidate current refresh token. User must login again.
      operationId: logout
      security:
        - oauth2: [read:profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully

  /auth/invite:
    post:
      tags:
        - Authentication
      summary: Invite user to academy
      description: Send invitation email to receptionist, instructor, or student with unique signup link
      operationId: inviteUser
      security:
        - oauth2: [write:users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                  example: instructor@example.com
                role:
                  type: string
                  enum: [receptionist, instructor, student]
                  example: instructor
                first_name:
                  type: string
                  example: Jane
                last_name:
                  type: string
                  example: Smith
      responses:
        '200':
          description: Invitation sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invitation sent to instructor@example.com
                  invitation_id:
                    type: string
                    example: inv_456def
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/signup-invited:
    post:
      tags:
        - Authentication
      summary: Complete signup as invited user
      description: Invited user completes registration with unique invitation token
      operationId: signupInvited
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invitation_token, password]
              properties:
                invitation_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: SecurePass123!
      responses:
        '201':
          description: Signup complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          description: Invalid or expired invitation token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Request password reset
      description: Send password reset email with unique reset link
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: user@academy.com
      responses:
        '200':
          description: Password reset email sent (always returns 200 for security)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: If email exists, password reset link sent

  /auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password with token
      description: Reset password using token from reset email
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                new_password:
                  type: string
                  format: password
                  minLength: 8
                  example: NewSecurePass456!
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password updated. Please login with new password.
        '400':
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users:
    get:
      tags:
        - Users
      summary: List all users in academy
      description: Get list of all users (admin/receptionist). Results filtered by role permissions.
      operationId: listUsers
      security:
        - oauth2: [read:users]
      parameters:
        - name: role
          in: query
          description: Filter by role (admin, receptionist, instructor, student)
          schema:
            type: string
            enum: [admin, receptionist, instructor, student]
        - name: is_active
          in: query
          description: Filter by active state
          schema:
            type: boolean
        - name: search
          in: query
          description: Search by name or email
          schema:
            type: string
        - name: limit
          in: query
          description: Number of results (default 20, max 100)
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  total:
                    type: integer
                    example: 45
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Users
      summary: Create new user
      description: Create user record (any role). Admin/receptionist only. Sends invitation email.
      operationId: createUser
      security:
        - oauth2: [write:users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, first_name, last_name, role]
              properties:
                email:
                  type: string
                  format: email
                  example: student@example.com
                first_name:
                  type: string
                  example: Carlos
                last_name:
                  type: string
                  example: Garcia
                role:
                  type: string
                  enum: [admin, receptionist, instructor, student]
                  example: student
                phone:
                  type: string
                  example: '+52-55-9876-5432'
                address:
                  type: string
                  example: Calle Secundaria 456, Ciudad de México
                date_of_birth:
                  type: string
                  format: date
                  example: '2010-05-15'
                hourly_rate:
                  type: number
                  format: float
                  description: Instructor-only. Hourly rate for payroll calculations.
                  example: 250.00
      responses:
        '201':
          description: User created. Invitation email sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Retrieve user details. Students can only see their own profile.
      operationId: getUser
      security:
        - oauth2: [read:users]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            example: user_123abc
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Users
      summary: Update user
      description: Update user information. Students can only update their own profile. Only admin can change roles.
      operationId: updateUser
      security:
        - oauth2: [write:users]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            example: user_123abc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                  example: John
                last_name:
                  type: string
                  example: Doe
                email:
                  type: string
                  format: email
                  example: john@example.com
                phone:
                  type: string
                  example: '+52-55-1234-5678'
                address:
                  type: string
                  example: Calle Principal 123, Ciudad de México
                date_of_birth:
                  type: string
                  format: date
                  example: '1990-05-15'
                hourly_rate:
                  type: number
                  format: float
                  description: Instructor-only. Updates hourly_rate in current academy context.
                  example: 250.00
                is_active:
                  type: boolean
                  description: Only admin can deactivate users
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Users
      summary: Deactivate user (soft delete)
      description: Deactivate user account (sets is_active to false). Only admin can delete users.
      operationId: deleteUser
      security:
        - oauth2: [write:users]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            example: user_123abc
      responses:
        '200':
          description: User deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User deactivated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/resend-invite:
    post:
      tags:
        - Users
      summary: Resend invitation email
      description: Resend invitation email to user (useful if original email was lost)
      operationId: resendInvite
      security:
        - oauth2: [write:users]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            example: user_123abc
      responses:
        '200':
          description: Invitation resent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Invitation email resent
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/password:
    patch:
      tags:
        - Users
      summary: Change user password
      description: Change password. Users can only change their own password. Requires current password verification.
      operationId: changePassword
      security:
        - oauth2: [write:profile]
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: string
            example: user_123abc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                  format: password
                  example: OldPassword123!
                new_password:
                  type: string
                  format: password
                  minLength: 8
                  example: NewPassword456!
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password updated successfully
        '400':
          description: Invalid current password or password requirements not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Users can only change their own password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

  /categories:
    get:
      tags:
        - Categories
      summary: List all categories
      description: Get list of all class categories in academy (admin only). Used for filtering classes and assigning to students.
      operationId: listCategories
      security:
        - oauth2: [read:classes]
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
                  total:
                    type: integer
                    example: 5
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Categories
      summary: Create new category
      description: Create new class category (e.g., pool, crossfit, hyrox). Admin only.
      operationId: createCategory
      security:
        - oauth2: [write:classes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Pool
                description:
                  type: string
                  example: Swimming pool classes and programs
                color:
                  type: string
                  description: Hex color for UI display
                  example: '#0066CC'
                monthly_fee:
                  type: number
                  format: float
                  description: Monthly subscription fee for students with this category
                  example: 1200.00
                enrollment_fee:
                  type: number
                  format: float
                  description: One-time enrollment fee charged when assigning category to a student
                  example: 500.00
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Category name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /categories/{id}:
    get:
      tags:
        - Categories
      summary: Get category details
      operationId: getCategory
      security:
        - oauth2: [read:classes]
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: string
            example: cat_123abc
      responses:
        '200':
          description: Category details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Categories
      summary: Update category
      operationId: updateCategory
      security:
        - oauth2: [write:classes]
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: string
            example: cat_123abc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Pool
                description:
                  type: string
                  example: Swimming pool classes
                color:
                  type: string
                  example: '#0066CC'
                monthly_fee:
                  type: number
                  format: float
                  example: 1200.00
                enrollment_fee:
                  type: number
                  format: float
                  example: 500.00
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Categories
      summary: Delete category
      operationId: deleteCategory
      security:
        - oauth2: [write:classes]
      parameters:
        - name: id
          in: path
          required: true
          description: Category ID
          schema:
            type: string
            example: cat_123abc
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Category deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /classes:
    get:
      tags:
        - Classes
      summary: List classes
      description: Get list of classes. Admins see all, instructors see assigned, students see available for enrollment.
      operationId: listClasses
      security:
        - oauth2: [read:classes]
      parameters:
        - name: instructor_id
          in: query
          description: Filter by instructor (admin only)
          schema:
            type: string
        - name: status
          in: query
          description: Filter by status (active, archived)
          schema:
            type: string
            enum: [active, archived, draft]
        - name: category_id
          in: query
          description: Filter by category ID (automatically applied for students based on their assigned categories)
          schema:
            type: string
        - name: search
          in: query
          description: Search by class name or description
          schema:
            type: string
        - name: limit
          in: query
          description: Number of results (default 20, max 100)
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of classes
          content:
            application/json:
              schema:
                type: object
                properties:
                  classes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Class'
                  total:
                    type: integer
                    example: 12
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags:
        - Classes
      summary: Create new class
      description: Create a new class. Only admin can create classes.
      operationId: createClass
      security:
        - oauth2: [write:classes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, instructor_id, schedule_day, schedule_time, category_ids]
              properties:
                name:
                  type: string
                  example: Yoga - Monday Morning
                description:
                  type: string
                  example: Beginner yoga class for adults
                instructor_id:
                  type: string
                  example: user_123abc
                schedule_day:
                  type: string
                  enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
                  example: monday
                schedule_time:
                  type: string
                  format: time
                  example: '09:00'
                duration_minutes:
                  type: integer
                  example: 60
                recurrence:
                  type: string
                  enum: [weekly, one_time]
                  description: Whether class repeats weekly or is one-time only
                  example: weekly
                category_ids:
                  type: array
                  description: Categories this class belongs to (e.g., [cat_pool, cat_crossfit]). Controls which students can see/enroll in this class.
                  items:
                    type: string
                  example: [cat_pool, cat_wellness]
                max_students:
                  type: integer
                  description: Optional capacity limit. If null, unlimited enrollment.
                  example: 20
                price:
                  type: number
                  format: float
                  description: Class price per enrollment
                  example: 150.00
                location:
                  type: string
                  example: Studio A, Building 1
      responses:
        '201':
          description: Class created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Class'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

