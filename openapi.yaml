        - name: id
          in: path
          required: true
          description: Payment ID
          schema:
            type: string
            example: pay_123abc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
