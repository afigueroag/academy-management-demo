                          format: float
                          example: 150.00
                        issued_date:
                          type: string
                          format: date
                          example: '2026-04-10'
                        due_date:
                          type: string
                          format: date
                          example: '2026-04-25'
                        days_overdue:
                          type: integer
                          description: Negative if not yet due, positive if overdue
                          example: 5
                        class_name:
                          type: string
                          example: Yoga - Monday Morning
                  summary:
                    type: object
                    properties:
                      total_unpaid:
                        type: number
                        format: float
                        description: Total unpaid amount
                        example: 5250.00
                      total_invoices:
                        type: integer
                        example: 18
                      overdue_count:
                        type: integer
                        description: Number of invoices overdue
                        example: 5
                      overdue_amount:
                        type: number
                        format: float
                        description: Total overdue amount
                        example: 2100.00
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dashboard/costs:
    get:
      tags:
        - Dashboard
      summary: Costs and expenses report
      description: Track operating costs (instructor salaries, facility rent, utilities, etc.). Admin only. (Optional feature for future)
      operationId: getCostsReport
      security:
        - oauth2: [admin]
      parameters:
        - name: start_date
          in: query
          required: true
          description: Period start (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          description: Period end (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: category
          in: query
          description: Filter by cost category (instructor_pay, rent, utilities, equipment, other)
          schema:
            type: string
            enum: [instructor_pay, rent, utilities, equipment, other]
      responses:
        '200':
          description: Costs report
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: object
                    properties:
                      start_date:
                        type: string
                        format: date
                      end_date:
                        type: string
                        format: date
                  costs:
                    type: array
                    items:
                      type: object
                      properties:
                        category:
                          type: string
                          example: instructor_pay
                        description:
                          type: string
                          example: April salary for Jane Smith
                        amount:
                          type: number
                          format: float
                          example: 8000.00
                        date:
                          type: string
                          format: date
                          example: '2026-04-30'
                  summary:
                    type: object
                    properties:
                      total_costs:
                        type: number
                        format: float
                      by_category:
                        type: object
                        example:
                          instructor_pay: 16000.00
                          rent: 5000.00
                          utilities: 800.00
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dashboard/students:
    get:
      tags:
        - Dashboard
      summary: Student metrics and growth
      description: Student acquisition, retention, and engagement metrics. Admin only.
      operationId: getStudentMetrics
      security:
        - oauth2: [admin]
      parameters:
        - name: start_date
          in: query
          description: Period start (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Period end (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Student metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall:
                    type: object
                    properties:
                      total_active:
                        type: integer
                        example: 250
                      total_inactive:
                        type: integer
                        example: 12
                      total_lifetime:
                        type: integer
                        example: 262
                  growth:
                    type: object
                    properties:
                      new_students:
                        type: integer
                        example: 18
                      churned_students:
                        type: integer
                        example: 2
                      net_growth:
                        type: integer
                        example: 16
                      growth_rate:
                        type: number
                        format: float
                        description: Percentage growth
                        example: 6.8
                  by_category:
                    type: object
                    description: Student distribution by subscription category
                    example:
                      Pool: 120
                      Crossfit: 85
                      Hyrox: 45
                  retention:
                    type: object
                    properties:
                      month_1_retention:
                        type: number
                        format: float
                        description: "% of students active after 1 month"
                        example: 92.5
                      month_3_retention:
                        type: number
                        format: float
                        example: 85.0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dashboard/profit-loss:
    get:
      tags:
        - Dashboard
      summary: Profit & Loss statement
      description: Revenue minus costs. Shows profitability over time. Admin only.
      operationId: getProfitLoss
      security:
        - oauth2: [admin]
      parameters:
        - name: start_date
          in: query
          required: true
          description: Period start (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          description: Period end (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: P&L statement
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: object
                    properties:
                      start_date:
                        type: string
                        format: date
                      end_date:
                        type: string
                        format: date
                  revenue:
                    type: number
                    format: float
                    example: 45000.00
                  costs:
                    type: number
                    format: float
                    example: 22000.00
                  gross_profit:
                    type: number
                    format: float
                    example: 23000.00
                  gross_margin:
                    type: number
                    format: float
                    description: Percentage (0-100)
                    example: 51.1
                  net_profit:
                    type: number
                    format: float
                    example: 23000.00
                  profit_margin:
                    type: number
                    format: float
                    description: Percentage (0-100)
                    example: 51.1
                  notes:
                    type: string
                    example: Strong month driven by new category enrollment

components:
  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          example: invalid_request
        message:
          type: string
          example: Email is required
        details:
          type: object

    Category:
      type: object
      required: [id, academy_id, name, created_at]
      properties:
        id:
          type: string
          example: cat_123abc
        academy_id:
          type: string
          example: acad_123abc
        name:
          type: string
          example: Pool
        description:
          type: string
          example: Swimming pool classes and programs
        color:
          type: string
          description: Hex color for UI display
          example: '#0066CC'
        monthly_fee:
          type: number
          format: float
          nullable: true
          description: Monthly subscription fee for this category
          example: 1200.00
        enrollment_fee:
          type: number
          format: float
          nullable: true
          description: One-time enrollment fee
          example: 500.00
        created_at:
          type: string
          format: date-time
          example: '2026-04-29T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-29T15:45:00Z'

    Payment:
      type: object
      required: [id, academy_id, enrollment_id, amount, status, created_at]
      properties:
        id:
          type: string
          description: Internal payment ID
          example: pay_123abc
        academy_id:
          type: string
          example: acad_123abc
        enrollment_id:
          type: string
          example: enroll_789ghi
        student_id:
          type: string
          example: user_456def
        student_name:
          type: string
          example: Carlos Garcia
        student_email:
          type: string
          example: carlos@example.com
        class_id:
          type: string
          example: class_123abc
        class_name:
          type: string
          example: Yoga - Monday Morning
        amount:
          type: number
          format: float
          example: 150.00
        currency:
          type: string
          example: MXN
        status:
          type: string
          enum: [pending, succeeded, failed, refunded]
          description: Payment status
          example: succeeded
        payment_method:
          type: string
          enum: [stripe, cash, transfer, check, other]
          description: How payment was made
          example: stripe
        stripe_payment_intent_id:
          type: string
          nullable: true
          description: Stripe PaymentIntent ID (if paid via Stripe)
          example: pi_1234567890
        invoice_id:
          type: string
          nullable: true
          description: Associated invoice ID
          example: inv_456def
        refund_info:
          type: object
          nullable: true
          description: Refund details (if payment was refunded)
          properties:
            refund_id:
              type: string
              example: re_1234567890
            refund_amount:
              type: number
              format: float
              example: 150.00
            refund_status:
              type: string
              example: succeeded
            refund_reason:
              type: string
              example: Student requested cancellation
            refunded_at:
              type: string
              format: date-time
              example: '2026-04-30T11:00:00Z'
        notes:
          type: string
          nullable: true
          example: null
        received_by:
          type: string
          nullable: true
          description: Name of receptionist (for cash payments)
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-04-29T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-29T15:45:00Z'

    AuthTokenResponse:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: JWT access token (expires in 30 minutes)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ1c2VyXzEyMyIsImFjYWRlbXlfaWQiOiJhY2FkXzEyMyIsInJvbGUiOiJhZG1pbiIsImV4cCI6MTcxNDQ0ODAwMH0.signature
        refresh_token:
          type: string
          description: JWT refresh token (expires in 30 days)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJ1c2VyXzEyMyIsImV4cCI6MTcxNzA0MDAwMH0.signature
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access token expiry in seconds
          example: 1800
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      required: [id, email, first_name, last_name, role, is_active, created_at]
      properties:
        id:
          type: string
          example: user_123abc
        email:
          type: string
          format: email
          example: john@academy.com
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        role:
          type: string
          enum: [admin, receptionist, instructor, student]
          description: Role in the academy referenced by academy_id (from JWT)
          example: instructor
        is_active:
          type: boolean
          description: Whether the user account is active
          example: true
        phone:
          type: string
          nullable: true
          example: '+52-55-1234-5678'
        address:
          type: string
          nullable: true
          example: Calle Principal 123, Ciudad de México
        date_of_birth:
          type: string
          format: date
          nullable: true
          example: '1990-05-15'
        academy_id:
          type: string
          description: Active academy context (from JWT). A user may belong to multiple academies.
          example: acad_123abc
        hourly_rate:
          type: number
          format: float
          nullable: true
          description: Instructor-only. Hourly rate for payroll calculations in current academy context.
          example: 250.00
        email_verified_at:
          type: string
          format: date-time
          nullable: true
          description: When the user verified their email. Null if not verified.
          example: '2026-04-29T10:30:00Z'
        created_at:
          type: string
          format: date-time
          example: '2026-04-29T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-29T15:45:00Z'

    Class:
      type: object
      required: [id, academy_id, name, instructor_id, schedule_day, schedule_time, status, created_at]
      properties:
        id:
          type: string
          example: class_123abc
        academy_id:
          type: string
          example: acad_123abc
        name:
          type: string
          example: Yoga - Monday Morning
        description:
          type: string
          example: Beginner yoga class for adults
        instructor:
          $ref: '#/components/schemas/InstructorSummary'
        schedule_day:
          type: string
          enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
          example: monday
        schedule_time:
          type: string
          format: time
          example: '09:00'
        duration_minutes:
          type: integer
          example: 60
        recurrence:
          type: string
          enum: [weekly, one_time]
          description: Whether class repeats weekly or is one-time only
          example: weekly
        max_students:
          type: integer
          nullable: true
          description: Capacity limit. Null means unlimited enrollment.
          example: 20
        enrolled_students:
          type: integer
          example: 15
        waiting_list_count:
          type: integer
          description: Number of students on waiting list (if class is at capacity)
          example: 3
        categories:
          type: array
          description: Categories this class belongs to (controls visibility for students)
          items:
            $ref: '#/components/schemas/Category'
          example:
            - id: cat_pool
              name: Pool
            - id: cat_wellness
              name: Wellness
        price:
          type: number
          format: float
          example: 150.00
        location:
          type: string
          example: Studio A, Building 1
        status:
          type: string
          enum: [active, archived, draft]
          example: active
        created_at:
          type: string
          format: date-time
          example: '2026-04-29T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-29T15:45:00Z'

    InstructorSummary:
      type: object
      required: [id, first_name, last_name, email]
      properties:
        id:
          type: string
          example: user_123abc
        first_name:
          type: string
          example: Jane
        last_name:
          type: string
          example: Smith
        email:
          type: string
          format: email
          example: jane@academy.com

    AttendanceRecord:
      type: object
      required: [id, class_id, student_id, session_date, status, created_at]
      properties:
        id:
          type: string
          description: Attendance record ID
          example: att_789ghi
        academy_id:
          type: string
          example: acad_123abc
        class_id:
          type: string
          example: class_123abc
        class_name:
          type: string
          example: Yoga - Monday Morning
        class_schedule:
          type: object
          properties:
            day:
              type: string
              example: monday
            time:
              type: string
              format: time
              example: '09:00'
        student_id:
          type: string
          example: user_456def
        student_name:
          type: string
          example: Carlos Garcia
        student_email:
          type: string
          example: carlos@example.com
        session_date:
          type: string
          format: date
          description: Date of the class
          example: '2026-04-29'
        status:
          type: string
          enum: [present, absent, excused]
          description: Attendance status
          example: present
        notes:
          type: string
          nullable: true
          example: Arrived 10 minutes late
        recorded_by:
          type: string
          description: Instructor or admin who recorded attendance
          example: user_123abc
        recorded_at:
          type: string
          format: date-time
          description: When attendance was recorded
          example: '2026-04-29T09:15:00Z'
        created_at:
          type: string
          format: date-time
          example: '2026-04-29T09:15:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-29T09:15:00Z'

    Enrollment:
      type: object
      required: [id, student_id, class_id, status, enrolled_at, academy_id]
      properties:
        id:
          type: string
          example: enroll_789ghi
        academy_id:
          type: string
          example: acad_123abc
        student_id:
          type: string
          example: user_456def
        student_name:
          type: string
          example: Carlos Garcia
        student_email:
          type: string
          example: carlos@example.com
        class_id:
          type: string
          example: class_123abc
        class_name:
          type: string
          example: Yoga - Monday Morning
        class_schedule:
          type: object
          description: Class schedule details
          properties:
            day:
              type: string
              example: monday
            time:
              type: string
              format: time
              example: '09:00'
            location:
              type: string
              example: Studio A
        instructor_name:
          type: string
          example: Jane Smith
        instructor_id:
          type: string
          example: user_123abc
        status:
          type: string
          enum: [active, completed, cancelled, waiting]
          description: active (enrolled), completed (class finished), cancelled (dropped), waiting (on waiting list)
          example: active
        waiting_position:
          type: integer
          nullable: true
          description: Position in waiting list (null if not waiting)
          example: null
        enrolled_at:
          type: string
          format: date-time
          example: '2026-04-29T10:30:00Z'
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          example: null
        amount_due:
          type: number
          format: float
          example: 150.00
        payment_id:
          type: string
          nullable: true
          description: Stripe payment ID (if payment was made)
          example: pi_1234567890
        notes:
          type: string
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: '2026-04-29T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-29T15:45:00Z'

    Invoice:
      type: object
      required: [id, academy_id, student_id, total, status, issued_date, created_at]
      properties:
        id:
          type: string
          description: Invoice ID (e.g., INV-2026-00001)
          example: inv_456def
        academy_id:
          type: string
          example: acad_123abc
        academy_name:
          type: string
          example: My Sports Academy
        student_id:
          type: string
          example: user_456def
        student_name:
          type: string
          example: Carlos Garcia
        student_email:
          type: string
          example: carlos@example.com
        payment_id:
          type: string
          nullable: true
          description: Associated payment ID
          example: pay_123abc
        line_items:
          type: array
          description: Services/classes charged in this invoice
          items:
            type: object
            properties:
              description:
                type: string
                example: Yoga - Monday Morning (1 class)
              class_id:
                type: string
                example: class_123abc
              enrollment_id:
                type: string
                example: enroll_789ghi
              quantity:
                type: integer
                description: Number of classes/months/units
                example: 1
              unit_price:
                type: number
                format: float
                example: 150.00
              amount:
                type: number
                format: float
                example: 150.00
        subtotal:
          type: number
          format: float
          example: 150.00
        tax:
          type: number
          format: float
          nullable: true
          description: Optional tax/VAT amount
          example: null
        discount:
          type: number
          format: float
          nullable: true
          description: Optional discount applied
          example: null
        total:
          type: number
          format: float
          example: 150.00
        currency:
          type: string
          example: MXN
        status:
          type: string
          enum: [issued, paid, unpaid, cancelled, refunded]
          description: Invoice status
          example: paid
        payment_method:
          type: string
          nullable: true
          enum: [stripe, cash, transfer, check, other]
          description: How payment was made (if paid)
          example: stripe
        payment_date:
          type: string
          format: date-time
          nullable: true
          description: Date payment was received
          example: '2026-04-29T10:30:00Z'
        due_date:
          type: string
          format: date-time
          nullable: true
          description: Payment due date (if invoice not yet paid)
          example: null
        issued_date:
          type: string
          format: date
          example: '2026-04-29'
        notes:
          type: string
          nullable: true
          example: Thank you for your enrollment!
        pdf_url:
          type: string
          nullable: true
          description: URL to download PDF (if generated)
          example: /invoices/inv_456def/download
        email_history:
          type: array
          description: Record of email sends
          items:
            type: object
            properties:
              sent_at:
                type: string
                format: date-time
              sent_to:
                type: string
              sent_by:
                type: string
          example:
            - sent_at: '2026-04-29T10:35:00Z'
              sent_to: carlos@example.com
              sent_by: system
        created_at:
          type: string
          format: date-time
          example: '2026-04-29T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-29T15:45:00Z'

  responses:
    BadRequest:
      description: Bad request (validation error)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: validation_error
            message: Email is required

    Unauthorized:
      description: Unauthorized (invalid/missing token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: unauthorized
            message: Invalid or expired token

    Forbidden:
      description: Forbidden (insufficient permissions)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: forbidden
            message: Only admins can perform this action

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: not_found
            message: User not found

  securitySchemes:
    oauth2:
      type: oauth2
      description: OAuth2 Authorization Code flow
      flows:
        authorizationCode:
          authorizationUrl: 'https://api.academy-management.com/oauth/authorize'
          tokenUrl: 'https://api.academy-management.com/api/v1/auth/login'
          refreshUrl: 'https://api.academy-management.com/api/v1/auth/refresh-token'
          scopes:
            read:profile: Read user profile
            read:academy: Read academy data
            read:users: List users
            read:classes: Read class data
            read:payments: Read payment data
            write:profile: Update user profile
            write:academy: Manage academy
            write:users: Create/update/delete users
            write:classes: Create/update/delete classes
            write:payments: Process payments
            admin: Full access
