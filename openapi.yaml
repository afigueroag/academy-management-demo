  /enrollments:
    get:
      tags:
        - Enrollments
      summary: List enrollments
      description: Get list of enrollments. Admins/receptionists see all, instructors see their class enrollments, students see their own.
      operationId: listEnrollments
      security:
        - oauth2: [read:users]
      parameters:
        - name: student_id
          in: query
          description: Filter by student (admin only)
          schema:
            type: string
        - name: class_id
          in: query
          description: Filter by class (instructors see their classes, admin sees all)
          schema:
            type: string
        - name: status
          in: query
          description: Filter by enrollment status
          schema:
            type: string
            enum: [active, completed, cancelled, waiting]
        - name: limit
          in: query
          description: Number of results (default 20, max 100)
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of enrollments
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrollments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Enrollment'
                  total:
                    type: integer
                    example: 150
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Enrollments
      summary: Enroll student in class
      description: Student enrolls in a class. If class is at capacity, student goes to waiting list. Requires student to have the class's assigned categories.
      operationId: createEnrollment
      security:
        - oauth2: [write:users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, class_id]
              properties:
                student_id:
                  type: string
                  example: user_456def
                class_id:
                  type: string
                  example: class_123abc
      responses:
        '201':
          description: Enrollment created (active or waiting list)
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrollment:
                    $ref: '#/components/schemas/Enrollment'
                  message:
                    type: string
                    example: "Student enrolled successfully (active enrollment)"
                  waiting_position:
                    type: integer
                    nullable: true
                    description: Position in waiting list (null if active enrollment)
                    example: null
        '400':
          description: Bad request (validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                no_category:
                  value:
                    error: forbidden_enrollment
                    message: Student does not have required category for this class
                already_enrolled:
                  value:
                    error: conflict
                    message: Student is already enrolled in this class
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /enrollments/{id}:
    get:
      tags:
        - Enrollments
      summary: Get enrollment details
      description: Get specific enrollment details with payment and class info
      operationId: getEnrollment
      security:
        - oauth2: [read:users]
      parameters:
        - name: id
          in: path
          required: true
          description: Enrollment ID
          schema:
            type: string
            example: enroll_789ghi
      responses:
        '200':
          description: Enrollment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Enrollment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Enrollments
      summary: Update enrollment
      description: Update enrollment status (admin/receptionist only). Can approve, cancel, or mark as completed.
      operationId: updateEnrollment
      security:
        - oauth2: [write:users]
      parameters:
        - name: id
          in: path
          required: true
          description: Enrollment ID
          schema:
            type: string
            example: enroll_789ghi
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [active, completed, cancelled, waiting]
                  description: New enrollment status. Admin only.
                  example: active
                notes:
                  type: string
                  example: Received payment via cash
      responses:
        '200':
          description: Enrollment updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrollment:
                    $ref: '#/components/schemas/Enrollment'
                  promoted_student:
                    type: object
                    nullable: true
                    description: If a waiting list student was promoted to active due to cancellation
                    properties:
                      enrollment_id:
                        type: string
                      student_id:
                        type: string
                      student_name:
                        type: string
                    example: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Enrollments
      summary: Cancel enrollment
      description: Cancel student enrollment in class. If student was waiting, remove from list. If student was active and class has waiting list, promote first waiting student.
      operationId: deleteEnrollment
      security:
        - oauth2: [write:users]
      parameters:
        - name: id
          in: path
          required: true
          description: Enrollment ID
          schema:
            type: string
            example: enroll_789ghi
      responses:
        '200':
          description: Enrollment cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Enrollment cancelled
                  promoted_student:
                    type: object
                    nullable: true
                    description: Student promoted from waiting list to active (if applicable)
                    properties:
                      enrollment_id:
                        type: string
                      student_id:
                        type: string
                      student_name:
                        type: string
                    example: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments/initiate:
    post:
      tags:
        - Payments
      summary: Initiate payment for enrollment
      description: Create Stripe PaymentIntent for student to pay for class enrollment. Money goes directly to academy's Stripe Connect account.
      operationId: initiatePayment
      security:
        - oauth2: [write:payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enrollment_id]
              properties:
                enrollment_id:
                  type: string
                  description: Enrollment ID for which payment is being made
                  example: enroll_789ghi
                amount:
                  type: number
                  format: float
                  description: Optional. If not provided, uses enrollment amount_due
                  example: 150.00
      responses:
        '200':
          description: PaymentIntent created. Client can now collect card details.
          content:
            application/json:
              schema:
                type: object
                required: [client_secret, payment_intent_id, amount, currency]
                properties:
                  client_secret:
                    type: string
                    description: Stripe client secret for frontend payment element
                    example: pi_1234567890_secret_abcdef
                  payment_intent_id:
                    type: string
                    description: Stripe PaymentIntent ID (for tracking)
                    example: pi_1234567890
                  amount:
                    type: number
                    format: float
                    example: 150.00
                  currency:
                    type: string
                    example: MXN
                  academy_id:
                    type: string
                    example: acad_123abc
                  enrollment_id:
                    type: string
                    example: enroll_789ghi
                  message:
                    type: string
                    example: PaymentIntent created. Collect card details on frontend and submit to /payments/confirm
        '400':
          description: Invalid enrollment or payment amount
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments/confirm:
    post:
      tags:
        - Payments
      summary: Confirm payment (after card details collected)
      description: Called after Stripe payment element collects card details. Frontend submits PaymentIntent details. Webhook will also confirm payment.
      operationId: confirmPayment
      security:
        - oauth2: [write:payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_intent_id, enrollment_id]
              properties:
                payment_intent_id:
                  type: string
                  description: Stripe PaymentIntent ID
                  example: pi_1234567890
                enrollment_id:
                  type: string
                  description: Enrollment being paid for
                  example: enroll_789ghi
      responses:
        '200':
          description: Payment confirmed and processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment:
                    $ref: '#/components/schemas/Payment'
                  enrollment_updated:
                    type: object
                    properties:
                      enrollment_id:
                        type: string
                      status:
                        type: string
                        example: active
                      payment_status:
                        type: string
                        example: paid
                  invoice:
                    type: object
                    description: Auto-generated invoice
                    properties:
                      invoice_id:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                  message:
                    type: string
                    example: Payment successful. Invoice created.
        '400':
          description: Payment failed or invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments:
    get:
      tags:
        - Payments
      summary: List payments
      description: Get list of all payments. Admins see all, receptionists see academy payments, students see own, instructors see their class enrollments' payments.
      operationId: listPayments
      security:
        - oauth2: [read:payments]
      parameters:
        - name: enrollment_id
          in: query
          description: Filter by enrollment
          schema:
            type: string
        - name: student_id
          in: query
          description: Filter by student (admin/receptionist only)
          schema:
            type: string
        - name: status
          in: query
          description: Filter by payment status
          schema:
            type: string
            enum: [pending, succeeded, failed, refunded]
        - name: start_date
          in: query
          description: Filter payments after date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Filter payments before date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: limit
          in: query
          description: Number of results (default 20, max 100)
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          description: Pagination offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of payments
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
                  total:
                    type: integer
                    example: 250
                  total_amount:
                    type: number
                    format: float
                    description: Sum of all filtered payments
                    example: 37500.00
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /payments/{id}:
    get:
      tags:
        - Payments
      summary: Get payment details
      description: Get specific payment with full details (enrollment, student, class, invoice)
      operationId: getPayment
      security:
        - oauth2: [read:payments]
      parameters:
        - name: id
          in: path
          required: true
          description: Payment ID
          schema:
            type: string
            example: pay_123abc
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags:
        - Payments
      summary: Update payment (admin only)
      description: Update payment notes or manually mark as paid (for cash payments handled outside Stripe)
      operationId: updatePayment
      security:
        - oauth2: [write:payments]
      parameters:
        - name: id
          in: path
          required: true
          description: Payment ID
          schema:
            type: string
            example: pay_123abc
      requestBody:
