          schema:
            type: string
        - name: date
          in: query
          description: Filter by attendance date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: start_date
          in: query
          description: Filter attendance after date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: Filter attendance before date (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: status
          in: query
