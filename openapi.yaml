                  total:
                    type: integer
                    example: 150
                  limit:
                    type: integer
                    example: 20
                  offset:
                    type: integer
                    example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Attendance
      summary: Record attendance (bulk or single)
      description: Mark student(s) attendance for a class. Instructor records their class attendance. Supports single or bulk entry via QR code or manual entry.
      operationId: recordAttendance
      security:
        - oauth2: [write:classes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [class_id, session_date]
              properties:
                class_id:
                  type: string
                  description: Class ID
                  example: class_123abc
                session_date:
                  type: string
                  format: date
                  description: Date of attendance
                  example: '2026-04-29'
                records:
                  type: array
                  description: Array of attendance records (single or multiple students)
                  items:
                    type: object
                    required: [student_id, status]
                    properties:
                      student_id:
                        type: string
                        example: user_456def
                      status:
                        type: string
                        enum: [present, absent, excused]
                        example: present
                      notes:
                        type: string
                        nullable: true
                        example: Arrived 10 minutes late
                  minItems: 1
      responses:
        '201':
          description: Attendance recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  class_id:
                    type: string
                    example: class_123abc
                  session_date:
                    type: string
                    format: date
                    example: '2026-04-29'
                  recorded_count:
                    type: integer
                    example: 15
                  attendance:
                    type: array
                    items:
                      $ref: '#/components/schemas/AttendanceRecord'
                  message:
                    type: string
                    example: Attendance recorded for 15 students
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden (instructor can only record for their classes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'

